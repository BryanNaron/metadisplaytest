<!doctype html>
<html>
<head>
<meta name="viewport" content="width=600, height=600">
<style>
body { margin:0; background:black; overflow:hidden; width:600px; height:600px; color:#e8f6ff; font-family:sans-serif;}
canvas { display:block; }

.focusable{
  background:#1c1e21;
  border:2px solid transparent;
  min-height:80px;
  margin:8px;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}
.focusable:focus{
  border-color:#00d4ff;
  box-shadow:0 0 20px #00d4ff;
}
</style>
</head>

<body>
<canvas id="c" width="600" height="600"></canvas>

<div id="menu">
  <button id="enable" class="focusable">Enable Motion</button>
  <button id="start" class="focusable" disabled>Start</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let running = false;
let hasIMU = false;

let gamma = 0;
let center = 0;
let playerX = 300;

let bullets = [];
let enemies = [];

const DPAD = {
  UP:"ArrowUp",DOWN:"ArrowDown",
  LEFT:"ArrowLeft",RIGHT:"ArrowRight",
  SELECT:"Enter"
};

function ensureFocus(){
  const f = document.activeElement;
  if(!f || !f.classList.contains("focusable")){
    const first = document.querySelector(".focusable:not([disabled])");
    if(first) first.focus();
  }
}

function moveFocus(dir){
  const list = [...document.querySelectorAll(".focusable:not([disabled])")];
  let i = list.indexOf(document.activeElement);
  if(i===-1){list[0].focus();return;}
  let next = (dir==="prev") ? (i-1+list.length)%list.length : (i+1)%list.length;
  list[next].focus();
}

document.addEventListener("keydown",(e)=>{
  ensureFocus();

  // gameplay
  if(running){
    if(e.key===DPAD.SELECT){ shoot(); return; }
    return;
  }

  // menu
  if(e.key===DPAD.LEFT || e.key===DPAD.UP){ moveFocus("prev"); }
  if(e.key===DPAD.RIGHT || e.key===DPAD.DOWN){ moveFocus("next"); }

  if(e.key===DPAD.SELECT){
    document.activeElement.click();
  }
});

// ✅ HARD safety loop
setInterval(ensureFocus, 1000);

function requestMotion(){
  if(typeof DeviceOrientationEvent.requestPermission==="function"){
    DeviceOrientationEvent.requestPermission().then(s=>{
      if(s==="granted") startIMU();
    });
  } else {
    startIMU();
  }
}

function startIMU(){
  window.addEventListener("deviceorientation",(e)=>{
    gamma = e.gamma || 0;
  });

  hasIMU=true;
  document.getElementById("start").disabled=false;

  // ✅ FIX: force focus forward
  document.getElementById("start").focus();
  setTimeout(()=>document.getElementById("start").focus(),50);
}

document.getElementById("enable").onclick = ()=>{
  requestMotion();

  // ✅ ensure we reset input state
  running = false;
};

document.getElementById("start").onclick = ()=>{
  center = gamma;
  running = true;
  document.getElementById("menu").style.display="none";
};

function shoot(){
  bullets.push({x:playerX, y:520});
}

function spawnEnemies(){
  enemies=[];
  for(let i=0;i<6;i++){
    enemies.push({x:100+i*70, y:80});
  }
}

spawnEnemies();

function update(){
  if(!running) return;

  let tilt = (gamma-center)*0.05;
  playerX += tilt*10;
  playerX = Math.max(20, Math.min(580, playerX));

  bullets.forEach(b=>b.y-=10);

  bullets = bullets.filter(b=>b.y>0);

  enemies.forEach(e=>{
    e.y += 0.2;
  });
}

function draw(){
  ctx.clearRect(0,0,600,600);

  if(running){
    // player
    ctx.fillStyle="#00d4ff";
    ctx.fillRect(playerX-10,540,20,10);

    // bullets
    ctx.fillStyle="#fff";
    bullets.forEach(b=>{
      ctx.fillRect(b.x-2,b.y,4,10);
    });

    // enemies
    ctx.fillStyle="#ff3355";
    enemies.forEach(e=>{
      ctx.fillRect(e.x-12,e.y-8,24,16);
    });
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById("enable").focus();
loop();
</script>

</body>
</html>
