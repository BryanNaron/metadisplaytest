<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>TiltGala Prototype</title>
  <style>

#topUI {
  position: absolute;
  left: 0;
  top: 0;
  width: 600px;
  height: 600px;

  pointer-events: none;

  z-index: 1000; /* ✅ ABOVE FLASH */
}

#flashOverlay {
  position: absolute;
  left: 0;
  top: 0;
  width: 600px;
  height: 600px;

  background: white;
  opacity: 0;

  pointer-events: none; /* ✅ important */
  z-index: 999; /* ✅ ABOVE EVERYTHING */
}
    :root{
      --bg:#000000;
      --panel:#101216;
      --panel2:#1c1e21;
      --text:#e8f6ff;
      --dim:#8fb8c7;
      --cyan:#00d4ff;
      --red:#ff3355;
      --yellow:#ffd400;
      --white:#ffffff;
    }

    html, body {
      width: 600px;
      height: 600px;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #app { position: relative; width: 600px; height: 600px; }
    canvas { display:block; width:600px; height:600px; background:var(--bg); }

#hud {
  position:absolute;
  top:0;
  left:0;
  right:0;
  transition: top 0.15s ease; /* ✅ smooth shift */
  z-index: 10
}

    .pill {
      background: rgba(16,18,22,0.78);
      border: 1px solid rgba(0,212,255,0.25);
      box-shadow: 0 0 14px rgba(0,212,255,0.12);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 16px;
      line-height: 1;
      white-space: nowrap;
    }

.pill strong {
  color: #ffffff;
  font-weight: 900;
}

    #panel {
      position:absolute;
      left:16px; right:16px; bottom:16px;
      background: rgba(16,18,22,0.84);
      border: 1px solid rgba(0,212,255,0.30);
      border-radius: 18px;
      box-shadow: 0 0 22px rgba(0,212,255,0.16);
      padding: 12px;
  z-index: 10;
    }

    #title { margin:0 0 6px 0; font-size:22px; font-weight:900; letter-spacing:0.2px; }
    #subtitle { margin:0 0 10px 0; font-size:14px; color:var(--dim); }

    .row {
      display:flex;
      gap:10px;
      flex-wrap: wrap;
    }

    .focusable {
      min-height: 88px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 2px solid transparent;
      background: rgba(28,30,33,0.92);
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      flex: 1 1 100%;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
    }

.focusable:focus {
  outline: none;

  /* ✅ KEEP rarity border color intact */
  
  /* ✅ ADD INNER WHITE HIGHLIGHT */
  box-shadow:
    0 0 0 2px #ffffff inset,  /* white inner ring */
    0 0 12px rgba(255,255,255,0.6); /* soft glow */

  transform: scale(1.05);
}

.focusable[disabled]{ opacity:0.45; }

.debugSelect {
  min-height: 56px;
  padding: 10px 12px;
  border-radius: 16px;
  border: 2px solid transparent;
  background: rgba(28,30,33,0.92);
  color: var(--text);
  font-size: 18px;
  font-weight: 800;
  width: 100%;
  appearance: auto;
}

.debugSelect:focus {
  outline: none;
  box-shadow:
    0 0 0 2px #ffffff inset,
    0 0 12px rgba(255,255,255,0.6);
}

.hidden { display:none !important; }
.hideInPerk {
  display: none;
}

  </style>
</head>

<body>
<div id="app">
  <canvas id="c" width="600" height="600"></canvas>

<div id="flashOverlay"></div>
<div id="topUI"></div>


<div id="hud" class="hidden" style="
  display:flex;
  justify-content: space-between;
  padding: 6px;
  gap: 10px;
">

  <!-- ✅ STATS GRID (3 columns) -->
<div style="
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  align-items: start;
  flex: 1;              /* ✅ THIS FIX */
  width: 100%;          /* ✅ ensures full stretch */
">
    <div class="pill">Score <strong id="score">0</strong></div>
    <div class="pill">Fire Rate <strong id="fd">0</strong></div>
    <div class="pill">Reload <strong id="rt">0</strong></div>

    <div class="pill">Bullet Velocity <strong id="bs">0</strong></div>
    <div class="pill">Capacity <strong id="bc">0</strong></div>
<div class="pill">Luck <strong id="luck">0</strong></div>
<div class="pill">Pickup Radius <strong id="pr">0</strong></div>
  </div>

<span id="status" class="hidden"></span>



</div>


<div id="panel">
<p id="title" class="panelText">BUSTED</p>
<p id="subtitle" class="panelText">Try better at not being bad</p>

  <div class="row" id="menuRow">
    <button id="btnStart" class="focusable">Start Game</button>
    <button id="btnDebug" class="focusable">Debug Mode</button>
  </div>

<div class="row hidden" id="debugRow" style="flex-direction: column;">

  <select id="debugLevelSelect" class="focusable debugSelect"></select>

  <button id="btnDbgLaunch" class="focusable">Launch</button>
  <button id="btnDbgBack" class="focusable">Back</button>
</div>

  <!-- ✅ MOVE THIS OUTSIDE debugRow -->
  <div class="row hidden" id="pauseRow">
    <button id="btnResume" class="focusable">Resume</button>
    <button id="btnExit" class="focusable">Exit</button>
  </div>

<div class="row hidden" id="perkRow" style="flex-direction: column;">

<div id="rarityLegend" style="
  display: flex;
  justify-content: center;
  gap: 14px;
  font-size: 10px;
  margin-bottom: 1px;
  opacity: 0.85;
">
  <span style="color:#dddddd;">COMMON</span>
  <span style="color:#4cff4c;">UNCOMMON</span>
  <span style="color:#66ccff;">RARE</span>
  <span style="color:#b84cff;">EPIC</span>
  <span style="color:#ff9933;">LEGENDARY</span>
</div>

  <button id="perk1" class="focusable"></button>
  <button id="perk2" class="focusable"></button>
  <button id="perk3" class="focusable"></button>
<button id="btnReroll" class="focusable" style="
  margin-top: 8px;
  font-size: 14px;
  min-height: 50px;
  background: rgba(255,212,0,0.15);
  border-color: rgba(255,212,0,0.4);
">
  Reroll
</button>

</div>
</div>

<script>
/* =========================================================
   ✅ INPUT SYSTEM
========================================================= */
const DPAD = {
  UP: 'ArrowUp', DOWN: 'ArrowDown',
  LEFT: 'ArrowLeft', RIGHT: 'ArrowRight',
  SELECT: 'Enter', BACK: 'Escape',
};

const ui = {
  canvas: document.getElementById('c'),
  topUI: document.getElementById('topUI'),
  score: document.getElementById('score'),
  fd: document.getElementById('fd'),
  bs: document.getElementById('bs'),
  bc: document.getElementById('bc'),
  rt: document.getElementById('rt'),


luck: document.getElementById('luck'),
pickupRadius: document.getElementById('pr'),

hud: document.getElementById('hud'),

status: document.getElementById('status'),

pauseRow: document.getElementById('pauseRow'),
btnResume: document.getElementById('btnResume'),
btnExit: document.getElementById('btnExit'),

  panel: document.getElementById('panel'),
  menuRow: document.getElementById('menuRow'),
  debugRow: document.getElementById('debugRow'),

  btnStart: document.getElementById('btnStart'),
  btnDebug: document.getElementById('btnDebug'),

debugLevelSelect: document.getElementById('debugLevelSelect'),
  btnDbgLaunch: document.getElementById('btnDbgLaunch'),
  btnDbgBack: document.getElementById('btnDbgBack'),

perkRow: document.getElementById('perkRow'),
perk1: document.getElementById('perk1'),
perk2: document.getElementById('perk2'),
perk3: document.getElementById('perk3'),
btnReroll: document.getElementById('btnReroll'),
flash: document.getElementById('flashOverlay'),
};

const ctx = ui.canvas.getContext('2d', { alpha:true });

let hasIMU = false;
let running = false;

// =====================================
// ✅ DEV / DEBUG TOGGLE
// =====================================
let DEV_MODE = true; // ✅ switch this ON / OFF

// ✅ XP toggle for debug
let DEBUG_ALLOW_XP = true; // default OFF

// ✅ hide debug button if dev mode is off
if (!DEV_MODE && ui.btnDebug) {
  ui.btnDebug.classList.add('hidden');
}


let isPaused = false;
let mode = 'menu';

let previousMode = 'menu'; // ✅ track mode before perk screen
let playerLuck = 0;
let perkEnterBoost = 0;
let perkWarpRamp = 0;
let perkTimeline = 0;
let flashValue = 0;     // 0 → 1 intensity
let flashPhase = 0;     // 0 = off, 1 = fade-in, 2 = fade-out
let flashTriggered = false;
let uiRevealed = false;
let gameplayHiddenForPerk = false;
let pickupRadiusBase = 60; // ✅ base magnet radius
let previewingPerk = null; // ✅ ADD THIS

let enemyRows = [];
let missileDrones = [];
let enemyMissiles = [];

// =====================================================
// ✅ ACTIVE LEVEL STATE
// =====================================================
let activeNodeId = null;
let activeLevelKey = null;
let activeLevelDef = null;

let levelTimer = 0;
let levelObjectiveComplete = false;



const FLASH_FADE_IN = 1.5;    // slower = smoother build
const FLASH_FADE_OUT = 4;  // bigger = faster drop
const FLASH_MAX = 1.0;      // peak brightness (1 = full white)

// menu | debugMenu | game | paused | debug_move | debug_weapon | debug_enemy | debug_asteroid | debug_power | debug_vel | debug_cap | debug_reload

let rawGamma = 0;
let centerGamma = 0;
let smoothGamma = 0; // ✅ NEW (gyro smoothing)

let keyLeft = false;
let keyRight = false;

function visibleFocusables(){
  return Array.from(document.querySelectorAll('.focusable:not([disabled]):not(.hidden)'));
}

function ensureFocus(){
  if (ui.panel.classList.contains('hidden')) return;
  const ae = document.activeElement;
  const ok = ae && ae.classList && ae.classList.contains('focusable') && !ae.disabled && !ae.classList.contains('hidden');
  if (!ok) {
    const list = visibleFocusables();
    if (list.length) list[0].focus();
  }
}

function moveFocus(step){
  const list = visibleFocusables();
  if (!list.length) return;

  const idx = list.indexOf(document.activeElement);
  const next = idx === -1 ? 0 : (idx + step + list.length) % list.length;

  list[next].focus();
}

// =====================================================
// ✅ STAT HIGHLIGHT + PERK PREVIEW SYSTEM
// =====================================================
function getRarityColor(rarity) {
  if (rarity === 'uncommon') return '#4cff4c';
  if (rarity === 'rare') return '#66ccff';
  if (rarity === 'epic') return '#b84cff';
  if (rarity === 'legendary') return '#ff9933';
  return '#dddddd';
}

function getPerkDelta(perk) {
  if (!perk || !perk.stat || !perk.rarity) return 0;
  return getTunedPerkValue(perk.stat, perk.rarity);
}

function refreshStatUI() {
if (previewingPerk) return; // ✅ DO NOT overwrite preview
const delay = getFireDelay();
const rps = getFireRateRPS(delay);

ui.fd.textContent = rps.toFixed(2) + 'rps';
  const vel = getBulletSpeed() * 60;
ui.bs.textContent = Math.round(vel) + 'm/s';
  ui.bc.textContent = getMagSize();
  ui.rt.textContent = (getReloadTime() / 60).toFixed(1) + 's';
  ui.luck.textContent = (1 + playerLuck).toFixed(2);
  ui.pickupRadius.textContent = pickupRadiusBase + 'm';
}

function clearStatHighlights() {
previewingPerk = null; // ✅ clear preview

  document.querySelectorAll('.pill').forEach(pill => {
    pill.style.boxShadow = '';
  });

  // ✅ restore normal stat text
  refreshStatUI();
}

function highlightPerkPreview(perk) {
  clearStatHighlights();
  previewingPerk = perk; // ✅ lock preview AFTER clear

  if (!perk || !perk.stat) return;

  const rarityColor = getRarityColor(perk.rarity);
  const delta = getPerkDelta(perk);

  let target = null;
  let currentDisplay = '';
  let totalDisplay = '';

  // ✅ FIRE RATE
  if (perk.stat === 'fireRate') {
    target = ui.fd;

const currentRps = getFireRate();
const previewRps = currentRps + delta;

currentDisplay = currentRps.toFixed(2) + 'rps';
totalDisplay = previewRps.toFixed(2) + 'rps';
  }

  // ✅ CAPACITY
  if (perk.stat === 'capacity') {
    target = ui.bc;

    const currentCap = getMagSize();
    const previewCap = currentCap + delta;

    currentDisplay = currentCap;
    totalDisplay = previewCap;
  }

  // ✅ RELOAD
  if (perk.stat === 'reload') {
    target = ui.rt;

    const currentReloadFrames = getReloadTime();
    const currentReloadSec = (currentReloadFrames / 60).toFixed(1);

    const previewReloadFrames = Math.max(10, currentReloadFrames - delta);
    const previewReloadSec = (previewReloadFrames / 60).toFixed(1);

currentDisplay = currentReloadSec + 's';
totalDisplay = previewReloadSec + 's';
  }

  // ✅ BULLET VELOCITY (future-safe)
  if (perk.stat === 'bulletVel') {
    target = ui.bs;

    const currentVel = getBulletSpeed();
    const previewVel = currentVel + delta;

currentDisplay = Math.round(currentVel * 60) + 'm/s';
totalDisplay = Math.round(previewVel * 60) + 'm/s';
  }

  // ✅ LUCK
  if (perk.stat === 'luck') {
    target = ui.luck;

    const currentLuck = (1 + playerLuck).toFixed(2);
    const previewLuck = (1 + playerLuck + delta).toFixed(2);

    currentDisplay = currentLuck;
    totalDisplay = previewLuck;
  }

  // ✅ PICKUP RADIUS
  if (perk.stat === 'pickup') {
    target = ui.pickupRadius;

    const currentRadius = pickupRadiusBase;
    const previewRadius = pickupRadiusBase + delta;

currentDisplay = currentRadius + 'm';
totalDisplay = previewRadius + 'm';
  }

  if (!target) return;

  const pill = target.closest('.pill');
  if (pill) {
    pill.style.boxShadow =
      '0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(0,212,255,0.6)';
  }

  target.innerHTML = `${currentDisplay} | <span style="color:${rarityColor};">${totalDisplay}</span>`;
}

// ✅ clear highlight when leaving perk UI
document.addEventListener('focusin', (e) => {
  if (!e.target.classList.contains('focusable')) {
    clearStatHighlights();
  }
});

// =========================================================
// ✅ INPUT (GRID LANES ONLY — NO DASH)
// Replace: keydown + keyup + touchstart + touchend
// =========================================================
document.addEventListener('keydown', (e) => {
// =====================================
// ✅ DEBUG KEYS (ONLY IF DEV MODE)
//     Always pull from central perk values
// =====================================
if (DEV_MODE) {

  // ✅ Fire Rate = uncommon fire rate perk
  if (e.key === '1') {
    const v = getTunedPerkValue('fireRate', 'uncommon');
    applyFireRateBoost(v);
    ui.status.textContent = `DEBUG: Fire Rate +${v.toFixed(2)}`;
    return;
  }

  // ✅ Reload = uncommon reload perk
  if (e.key === '2') {
    const v = getTunedPerkValue('reload', 'uncommon');
    applyReloadBoost(v);
    ui.status.textContent = `DEBUG: Reload Faster -${(v / 60).toFixed(2)}s`;
    return;
  }

  // ✅ Bullet Velocity = uncommon bullet velocity perk
  if (e.key === '3') {
    const v = getTunedPerkValue('bulletVel', 'uncommon');
    applyBulletVelocityBoost(v);
    ui.status.textContent = `DEBUG: Bullet Velocity +${Math.round(v * 60)} m/s`;
    return;
  }

  // ✅ Capacity = lowest capacity perk value
  if (e.key === '4') {
    const v = getTunedPerkValue('capacity', 'common');
    applyCapacityBoost(v);
    ui.status.textContent = `DEBUG: Capacity +${Math.round(v)}`;
    return;
  }

  // ✅ Luck = lowest luck perk value
  if (e.key === '5') {
    const v = getTunedPerkValue('luck', 'rare');
    playerLuck += v;
    ui.status.textContent = `DEBUG: Luck +${v.toFixed(2)}`;
    return;
  }

  // ✅ Pickup Radius = lowest pickup perk value
  if (e.key === '6') {
    const v = getTunedPerkValue('pickup', 'uncommon');
    pickupRadiusBase += v;
    ui.status.textContent = `DEBUG: Pickup Radius +${Math.round(v)}`;
    return;
  }

  // ✅ Toggle XP / Score
  if (e.key === '`') {
    DEBUG_ALLOW_XP = !DEBUG_ALLOW_XP;
    ui.status.textContent = DEBUG_ALLOW_XP
      ? 'DEBUG: XP ENABLED'
      : 'DEBUG: XP DISABLED';
    return;
  }
}


// =========================
// ✅ MAP MODE INPUT
// =========================
if (mode === 'map') {
  handleMapKey(e);
  return;
}

// =========================
// ✅ GAME INPUT (ONLY when NOT paused and NOT perk_select)
// =========================
if (running && !isPaused && mode !== 'perk_select') {

  // ✅ Open pause (only opens, never closes via UP)
if (e.key === DPAD.UP) {
  previousMode = mode;     // ✅ remember what we were testing
  isPaused = true;
  setMode('paused');
  e.preventDefault();
  return;
}

  // ✅ movement (only during gameplay)
  if (e.key === DPAD.LEFT || e.key === 'a' || e.key === 'A') {
    stepLane(-1);
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.RIGHT || e.key === 'd' || e.key === 'D') {
    stepLane(+1);
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.BACK) {
    exitToMenu();
    e.preventDefault();
    return;
  }

  return;
}

// =========================
  // ✅ MENU NAVIGATION (WORKS FOR DEBUG + PERKS + PAUSE)
  // =========================
  ensureFocus();

  const ae = document.activeElement;

  // ✅ native select handling in debug menu
  if (mode === 'debugMenu' && ae === ui.debugLevelSelect) {

    if (e.key === DPAD.UP || e.key === DPAD.LEFT) {
      if (ui.debugLevelSelect.selectedIndex > 0) {
        ui.debugLevelSelect.selectedIndex -= 1;
      }
      e.preventDefault();
      return;
    }

    if (e.key === DPAD.DOWN || e.key === DPAD.RIGHT) {
      if (ui.debugLevelSelect.selectedIndex < ui.debugLevelSelect.options.length - 1) {
        ui.debugLevelSelect.selectedIndex += 1;
      }
      e.preventDefault();
      return;
    }

    if (e.key === DPAD.SELECT) {
      ui.btnDbgLaunch.focus();
      e.preventDefault();
      return;
    }

    if (e.key === DPAD.BACK) {
      goToMenu();
      e.preventDefault();
      return;
    }
  }

  if (e.key === DPAD.UP || e.key === DPAD.LEFT) {
    moveFocus(-1);
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.DOWN || e.key === DPAD.RIGHT) {
    moveFocus(1);
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.SELECT) {
    if (ae && ae.classList && ae.classList.contains('focusable')) {
      ae.click();
    }
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.BACK && mode === 'debugMenu') {
    goToMenu();
    e.preventDefault();
    return;
  }

});

document.addEventListener('keyup', (e) => {
  if (e.key === DPAD.LEFT || e.key === 'a' || e.key === 'A') keyLeft = false;
  if (e.key === DPAD.RIGHT || e.key === 'd' || e.key === 'D') keyRight = false;
});

// -------- SWIPE INPUT (LANE STEP) --------
let touchStartX = 0;
let touchStartTime = 0;

document.addEventListener('touchstart', (e) => {
  if (!running) return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartTime = performance.now();
});

document.addEventListener('touchend', (e) => {
  if (!running) return;

  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dt = (performance.now() - touchStartTime) / 1000;

  const minSwipeDist = 25;
  const maxSwipeTime = 0.30;

  if (Math.abs(dx) > minSwipeDist && dt < maxSwipeTime) {
    if (dx > 0) stepLane(+1);
    else stepLane(-1);
  }
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) setTimeout(ensureFocus, 0);
});

setInterval(ensureFocus, 1000);

async function requestMotionPermission(){
  try {
    let ok = true;

    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const state = await DeviceOrientationEvent.requestPermission();
      ok = ok && (state === 'granted');
    }

    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      const state2 = await DeviceMotionEvent.requestPermission();
      ok = ok && (state2 === 'granted');
    }

    if (ok) startIMU();
    else ui.status.textContent = 'IMU Denied';
  } catch (err) {
    startIMU();
  }
}

function startIMU(){
  window.addEventListener('deviceorientation', (e) => {
    if (typeof e.gamma === 'number') rawGamma = e.gamma;
  }, true);

  hasIMU = true;
  ui.status.textContent = 'IMU On';
  if (ui.btnCal) ui.btnCal.disabled = false;
ui.btnStart.disabled = false;

if (ui.btnCal) {
  ui.btnCal.focus();
  setTimeout(() => ui.btnCal.focus(), 0);
}
  ui.btnStart.disabled = false;


}

function calibrate(){
  centerGamma = rawGamma;
  ui.status.textContent = 'Calibrated';
  ui.btnStart.focus();
  setTimeout(() => ui.btnStart.focus(), 0);
}

/* =========================================================
   ✅ GRID / LANE SYSTEM (ADJUSTABLE)
========================================================= */

// ✅ change this ONE number later if you want more/less columns
let GRID_COLS = 8;

// ✅ usable horizontal space for lanes (tune these if you want wider margins)
let GRID_LEFT_X  = 60;
let GRID_RIGHT_X = 540;

// derived lane centers
let GRID_LANES = [];

function rebuildGridLanes(){
  GRID_LANES = [];
  if (GRID_COLS < 2) GRID_COLS = 2;

  const span = (GRID_RIGHT_X - GRID_LEFT_X);
  const step = span / (GRID_COLS - 1);

  for (let i = 0; i < GRID_COLS; i++) {
    GRID_LANES.push(GRID_LEFT_X + step * i);
  }
}

// call once on load
rebuildGridLanes();

// random lane center (for enemies/powerups)
function getRandomLaneX(){
  return GRID_LANES[Math.floor(Math.random() * GRID_LANES.length)];
}

// nearest lane index for an x position
function nearestLaneIndex(x){
  let best = 0;
  let bestDist = Math.abs(x - GRID_LANES[0]);

  for (let i = 1; i < GRID_LANES.length; i++) {
    const d = Math.abs(x - GRID_LANES[i]);
    if (d < bestDist) {
      bestDist = d;
      best = i;
    }
  }
  return best;
}

// clamp lane index
function clampLane(i){
  return Math.max(0, Math.min(GRID_COLS - 1, i));
}
/* =========================================================
   ✅ MOVEMENT SYSTEM (GRID STYLE ONLY)
========================================================= */
let playerY = 540;

// ✅ lane-based player state
let playerLane = Math.floor(GRID_COLS / 2);
let playerX = GRID_LANES[playerLane];

// ✅ smooth visual glide between lanes (not analog movement)
let laneLerpSpeed = 18; // higher = snappier (try 14–24)

const DASH_LANES = 1;        // ✅ dash moves this many lanes (1 = one column)
const DASH_TIME = 0.08;      // dash animation duration in seconds
const DASH_COOLDOWN = 0.35;  // seconds

let dashStartX = 0;
let dashTargetX = 0;

// ✅ gyro-to-lane tuning
const GYRO_DEADZONE = 5;     // degrees-ish feel (you already like 5)

// ✅ Helper: step lanes
function stepLane(dir){
  playerLane = clampLane(playerLane + dir);
  desiredLane = playerLane;
}

function isPlayerCenteredInLane(){
  const targetX = GRID_LANES[playerLane];
  const threshold = 2; // ✅ pixels tolerance (tune 1–4)

  return Math.abs(playerX - targetX) <= threshold;
}

// ✅ Dash now means "jump lanes"
function dashLeft(){
  if (dashCooldown > 0) return;

  const targetLane = clampLane(playerLane - DASH_LANES);

  dashStartX = playerX;
  dashTargetX = GRID_LANES[targetLane];

  playerLane = targetLane; // commit lane
  desiredLane = playerLane;

  dashTimer = DASH_TIME;
  dashCooldown = DASH_COOLDOWN;
}

function dashRight(){
  if (dashCooldown > 0) return;

  const targetLane = clampLane(playerLane + DASH_LANES);

  dashStartX = playerX;
  dashTargetX = GRID_LANES[targetLane];

  playerLane = targetLane;
  desiredLane = playerLane;

  dashTimer = DASH_TIME;
  dashCooldown = DASH_COOLDOWN;
}

function updateMovement(dt){

  // ✅ debug_move: ONLY keyboard lane stepping, no gyro influence
  if (mode === 'debug_move' || mode === 'game') {
    const targetX = GRID_LANES[playerLane];
    playerX += (targetX - playerX) * Math.min(1, laneLerpSpeed * dt);

    if (dashCooldown > 0) dashCooldown -= dt;
    if (dashTimer > 0) dashTimer -= dt;

    return;
  }

  if (dashTimer > 0) {
    dashTimer -= dt;
    const t = 1 - (dashTimer / DASH_TIME);
    playerX = dashStartX + (dashTargetX - dashStartX) * t;
  } else {
    const targetX = GRID_LANES[playerLane];
    playerX += (targetX - playerX) * Math.min(1, laneLerpSpeed * dt);
  }

  if (dashCooldown > 0) dashCooldown -= dt;
}

  const v = getTunedPerkValue(stat, rarity);

  if (stat === 'fireRate') {
    return `+${v.toFixed(2)} Fire Rate`;
  }

  if (stat === 'bulletVel') {
    return `+${Math.round(v * 60)} m/s Shot Speed`;
  }

  if (stat === 'capacity') {
    return `+${Math.round(v)} Capacity`;
  }

  if (stat === 'reload') {
    return `-${(v / 60).toFixed(2)}s Reload`;
  }

  if (stat === 'luck') {
    return `+${v.toFixed(2)} Luck`;
  }

  if (stat === 'pickup') {
    return `+${Math.round(v)} Pickup Radius`;
  }

  return '';
}

function updateWeapons(dt){

  const spd = getBulletSpeed();

  bullets.forEach(b => {
    b.y -= spd * dt * 60;
    b.x += b.vx * dt * 60;
  });

  bullets = bullets.filter(
    b => b.y > -20 && b.x > -40 && b.x < 640
  );

  if (isReloading) {
    reloadTimer -= dt;

    if (reloadTimer <= 0) {
      finishReload();
    }
    return;
  }

  if (ammoInMag <= 0) {
    startReload();
    return;
  }

  fireTimer -= dt;

  if (fireTimer <= 0) {
    if (isPlayerCenteredInLane()) {
      fire();
      fireTimer = getFireDelay() / 60;
    }
  }
}

function fire(){
  if (!isPlayerCenteredInLane()) return;
  if (ammoInMag <= 0 || isReloading) return;

  bullets.push({ x: playerX, y: 520, vx: 0 });
  ammoInMag--;

  if (ammoInMag <= 0) startReload();
}

// Total XP (never resets except on new run) – this is what your pause HUD "Score" shows.
let score = 0;

// Logical level + XP toward next level (gameplay truth)
let logicLevel = 1;
let levelXP = 0;

// Displayed level + animated XP (UI truth)
let displayLevel = 1;
let displayXP = 0;

// XP bar animation state machine
let xpBarState = 'normal'; // 'normal' | 'fill' | 'flash' | 'perk_hold' | 'spill'
let xpFlashTimer = 0;      // seconds
let pendingDisplayLevels = 0;

// tuning (feel)
const XP_FILL_SPEED = 80;   // XP per second while forcing to 100%
const XP_LERP_SPEED = 10;    // lerp speed during normal/spill (6–14)
const XP_FLASH_TIME = 0.18;  // yellow flash duration

function getXPRequiredFor(level){
  // ✅ easier early leveling (tune as needed)
  // L1->2: 50, L2->3: 70, L3->4: 90...
  return Math.floor(30 + level * 20);
}

// Call this whenever you award XP.
// This updates TOTAL XP immediately, updates LOGICAL level immediately,
// but the UI level/bar animates with fill->flash->spill.
function awardXP(amount){
// ✅ block XP during debug unless enabled
if (DEV_MODE && !DEBUG_ALLOW_XP) return;
  if (!Number.isFinite(amount) || amount <= 0) return;

  // total XP
  score += amount;
  ui.score.textContent = score;

  // add to current-level XP, and level up logically as needed
  let tmpLevel = logicLevel;
  let tmpXP = levelXP + amount;

  while (tmpXP >= getXPRequiredFor(tmpLevel)) {
    tmpXP -= getXPRequiredFor(tmpLevel);
    tmpLevel++;
  }

  logicLevel = tmpLevel;
  levelXP = tmpXP;

  // queue UI level-ups if the display is behind
  pendingDisplayLevels = Math.max(0, logicLevel - displayLevel);

  // if we just crossed at least one level, force the UI into "fill to 100" mode
  if (pendingDisplayLevels > 0 && xpBarState === 'normal') {
    xpBarState = 'fill';
  }
}

// Call this once per frame (in update loop) to animate the bar.
function updateXPBar(dt){
  if (!Number.isFinite(dt) || dt <= 0) return;

if (xpBarState === 'perk_hold') return;

  const reqDisplay = getXPRequiredFor(displayLevel);

  if (xpBarState === 'normal') {
    // If logical level is ahead, we need to show fill->flash cycles.
    if (pendingDisplayLevels > 0) {
      xpBarState = 'fill';
      return;
    }

    // Otherwise, just smoothly follow actual XP (same level)
    const target = Math.max(0, Math.min(reqDisplay, levelXP));
    const diff = target - displayXP;
const step = XP_FILL_SPEED * dt;

if (Math.abs(diff) <= step) {
  displayXP = target;
} else {
  displayXP += Math.sign(diff) * step;
}
    return;
  }

  if (xpBarState === 'fill') {
    // Force to 100% before leveling UI
    displayXP += XP_FILL_SPEED * dt;
    if (displayXP >= reqDisplay) {
      displayXP = reqDisplay;
      xpBarState = 'flash';
      xpFlashTimer = XP_FLASH_TIME;
    }
    return;
  }

  if (xpBarState === 'flash') {
    xpFlashTimer -= dt;
if (xpFlashTimer <= 0) {

  // Advance displayed level AFTER flash
  displayLevel++;
  pendingDisplayLevels = Math.max(0, pendingDisplayLevels - 1);

  // ✅ HOLD bar full + yellow while perk UI is open
  displayXP = getXPRequiredFor(displayLevel);
  xpBarState = 'perk_hold';

// ✅ open perk UI using timeline
generatePerkChoices();
isPaused = true;
previousMode = mode;
setMode('perk_select');


  return;
}  }

  if (xpBarState === 'spill') {
    // Now displayLevel should match logicLevel, so animate leftover XP in.
    const req = getXPRequiredFor(displayLevel);
    const target = Math.max(0, Math.min(req, levelXP));
    const diff = target - displayXP;
const step = XP_FILL_SPEED * dt;

if (Math.abs(diff) <= step) {
  displayXP = target;
  xpBarState = 'normal';
} else {
  displayXP += Math.sign(diff) * step;
}


    if (Math.abs(target - displayXP) < 0.25) {
      displayXP = target;
      xpBarState = 'normal';
    }
    return;
  }
}

// ✅ Base rarity weights (commons are normal; higher tiers exponentially rarer)
const RARITY_WEIGHTS_BASE = {
  common: 70,
  uncommon: 20,
  rare: 8,
  epic: 1.8,
  legendary: 0.2
};

function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

// ✅ Luck modifies weights: higher rarities benefit more than lower rarities.
// playerLuck is intended to be small (e.g., 0.0 → 1.0 range).
function getModifiedRarityWeights(){
  const luck = clamp(playerLuck, 0, 2); // allow growth later, but clamp to avoid extremes

  // Start from base weights
  const w = { ...RARITY_WEIGHTS_BASE };

  // Reduce common slightly as luck rises, and boost higher tiers more aggressively
  w.common    *= (1 - 0.25 * luck);      // up to -50% at luck=2
  w.uncommon  *= (1 + 0.20 * luck);
  w.rare      *= (1 + 0.60 * luck);
  w.epic      *= (1 + 1.30 * luck);
  w.legendary *= (1 + 2.20 * luck);

  // Safety: don’t let common go negative
  w.common = Math.max(1, w.common);

  return w;
}

// ✅ Standard weighted roll using cumulative weights (common approach)
function rollRarity(){
  const weights = getModifiedRarityWeights();
  const entries = Object.entries(weights);

  const total = entries.reduce((sum, [,w]) => sum + w, 0);
  let r = Math.random() * total;

  for (const [rarity, w] of entries){
    if (r < w) return rarity;
    r -= w;
  }
  return 'common';
}

function getPerksByRarity(rarity){
  return availablePerks.filter(p => p.rarity === rarity);
}



function generatePerkChoices(count = 3){
  activePerkChoices = [];

  // We'll try to avoid duplicates when possible
  const usedIds = new Set();

  for (let i = 0; i < count; i++) {

    // 1) roll rarity first
    const rarity = rollRarity();

    // 2) pick from that rarity pool
    let pool = getPerksByRarity(rarity);

    // remove already-used perks if possible
    const filtered = pool.filter(p => !usedIds.has(p.id));
    if (filtered.length) pool = filtered;

    // fallback if pool empty (e.g., you don't have epic perks yet)
    if (!pool.length) {
      const fallback = availablePerks.filter(p => !usedIds.has(p.id));
      const finalPool = fallback.length ? fallback : availablePerks;
      const pick = finalPool[Math.floor(Math.random() * finalPool.length)];
      activePerkChoices.push(pick);
      usedIds.add(pick.id);
      continue;
    }

    const pick = pool[Math.floor(Math.random() * pool.length)];
    activePerkChoices.push(pick);
    usedIds.add(pick.id);
  }
}

let enemies = [];


function spawnEnemies(){
  enemies = [];
  enemyRows = [];

  const ROW_COUNT = 3;
  const ROW_SPACING = 70;

  for (let row = 0; row < ROW_COUNT; row++) {

    const direction = (row % 2 === 0) ? 1 : -1;

    // ✅ shared row timing/state
    const rowState = {
      direction: direction,       // which way this row moves first
      state: 'idle',              // idle -> telegraph -> move -> idle
      idleTimer: 0,
      idleTime: 0.6 + row * 0.1,  // slight wave timing per row
      telegraphTimer: 0,
      shiftDir: direction
    };

    enemyRows.push(rowState);

    // ✅ spawn enemies in alternating lanes
    for (let i = 0; i < GRID_COLS; i += 2) {
      const lane = i;

      enemies.push({
        lane: lane,
        targetLane: lane,

        homeLane: lane,
        swingRange: 1, // only move 1 lane away from home

        x: GRID_LANES[lane],
        targetX: GRID_LANES[lane],

        y: 80 + row * ROW_SPACING,

        w: 24,
        h: 16,
        alive: true,

        row: row, // ✅ linked to shared row

        telegraphTimer: 0,
        willShift: false,
        shiftDir: 0
      });
    }
  }
}

function updateEnemies(dt){

  // =====================================
  // ✅ UPDATE SHARED ROW STATES
  // =====================================
  enemyRows.forEach(r => {

    if (r.state === 'idle') {
      r.idleTimer += dt;

      if (r.idleTimer >= r.idleTime) {
        r.state = 'telegraph';
        r.telegraphTimer = 0.25;
        r.shiftDir = r.direction;
        r.idleTimer = 0;
      }
    }

    else if (r.state === 'telegraph') {
      r.telegraphTimer -= dt;

      if (r.telegraphTimer <= 0) {
        r.state = 'move';
      }
    }

    else if (r.state === 'move') {
      // ✅ after one move, reverse direction for next cycle
      r.direction *= -1;
      r.state = 'idle';
    }
  });

  // =====================================
  // ✅ APPLY ROW STATE TO EACH ENEMY
  // =====================================
  enemies.forEach(e => {

      const minLane = e.homeLane - e.swingRange;
      const maxLane = e.homeLane + e.swingRange;

      let newLane = e.targetLane + e.shiftDir;

      // ✅ keep motion bounded around home lane
      if (newLane < minLane || newLane > maxLane) {
        newLane = e.targetLane;
      } else {
        e.targetLane = newLane;
        e.targetX = GRID_LANES[newLane];
      }

      e.willShift = false;
    }

    // ✅ smooth movement toward target lane
    e.x += (e.targetX - e.x) * Math.min(1, 12 * dt);

    // ✅ reset if offscreen
    if (e.y > 610) {
      e.y = 80 + e.row * 70;

      e.targetLane = e.homeLane;
      e.x = GRID_LANES[e.homeLane];
      e.targetX = e.x;
      e.telegraphTimer = 0;
      e.willShift = false;
      e.shiftDir = 0;
    }
  });

    const scale = currentReload / 300;
    baseHP = 3 + value * 0.12 * scale;

  return Math.max(1, Math.round(baseHP));
}

function updatePickups(dt) {

  // ✅ pickups are level-controlled only

  pickups.forEach(p => {

    p.pulse += dt * 6;

    const dx = playerX - p.x;
    const dy = playerY - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const MAGNET_RADIUS = pickupRadiusBase;

    if (dist < MAGNET_RADIUS) {
      p.magnetized = true;
    }

    // =====================================
    // ✅ MAGNET OVERRIDES ALL OTHER MOTION
    // =====================================
    if (p.magnetized) {
      const pull = 0.05 + p.glow * 0.1;
      p.x += dx * pull;
      p.y += dy * pull;

      p.glow = Math.min(1, p.glow + dt * 4);
      return;
    }

    // =====================================
    // ✅ SPECIAL HEAVY CORE REVEAL MOTION
    // =====================================
    if (p.motionType === 'heavy_core_reveal') {

      if (p.motionState === 'reveal_up') {
        // move upward
        p.y += p.vy * dt * 60;

        // ease upward speed toward zero
        p.vy += 0.06;

        if (p.vy >= 0) {
          p.vy = 0;
          p.motionState = 'hover';
        }
      }

      else if (p.motionState === 'hover') {
        p.hoverTimer -= dt;

        if (p.hoverTimer <= 0) {
          p.motionState = 'descend';
          p.vy = 0;
        }
      }

      else if (p.motionState === 'descend') {
        // ramp into slow fixed downward speed
        p.vy += 0.02;

        if (p.vy > p.targetFallSpeed) {
          p.vy = p.targetFallSpeed;
        }

        p.y += p.vy * dt * 60;
      }

      p.glow = Math.max(0, p.glow - dt * 2);
      return;
    }

    // =====================================
    // ✅ DEFAULT PICKUP FALLBACK
    // =====================================
    p.y += p.fall * dt * 60;
    p.glow = Math.max(0, p.glow - dt * 2);
  });

  pickups = pickups.filter(p => p.y < 640);

  handlePlayerPickupCollision();
}


function handlePlayerPickupCollision() {

  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];

    const hit =
      Math.abs(p.x - playerX) < 12 &&
      Math.abs(p.y - playerY) < 12;

    if (hit) {
      awardXP(p.value);
      spawnPickupBurst(p.x, p.y, p.color);
      spawnXPText(p.x, p.y, p.value, p.color);
      pickups.splice(i, 1);
    }
  }
}

// ✅ CURSOR LERP
function updateMapCursor(dt) {
  if (mode !== 'map') return;

  const lerp = Math.min(1, 10 * dt);
  mapCursorX += (mapCursorTargetX - mapCursorX) * lerp;
  mapCursorY += (mapCursorTargetY - mapCursorY) * lerp;
}

// ✅ SET PREVIEW
function setMapPreview(nodeId) {
  mapPreviewNodeId = nodeId;

  const node = mapNodeLookup[nodeId];
  if (!node) return;

  mapCursorTargetX = node.x;
  mapCursorTargetY = node.y;
}

// ✅ CLEAR PREVIEW BACK TO CURRENT
function clearMapPreview() {
  mapPreviewNodeId = null;

  const node = mapNodeLookup[mapCurrentNodeId];
  if (!node) return;

  mapCursorTargetX = node.x;
  mapCursorTargetY = node.y;
}

// ✅ CYCLE CURRENT REACHABLE OPTIONS
function cycleMapPreview(dir) {
  if (!mapReachableNodeIds.length) return;

  if (!mapPreviewNodeId) {
    if (dir < 0) {
      setMapPreview(mapReachableNodeIds[mapReachableNodeIds.length - 1]);
    } else {
      setMapPreview(mapReachableNodeIds[0]);
    }
    return;
  }

  const idx = mapReachableNodeIds.indexOf(mapPreviewNodeId);
  const next = (idx + dir + mapReachableNodeIds.length) % mapReachableNodeIds.length;

  setMapPreview(mapReachableNodeIds[next]);
}






function confirmMapAction() {

  // =====================================
  // ✅ CASE 1: preview exists
  // =====================================
  if (mapPreviewNodeId) {

    // ❌ preview is NOT selectable
    // ✅ snap back to first selectable node instead of failing silently
    if (!mapReachableNodeIds.includes(mapPreviewNodeId)) {
      if (mapReachableNodeIds.length) {
        setMapPreview(mapReachableNodeIds[0]);
      } else {
        clearMapPreview();
      }
      return;
    }

    // ✅ valid move
    mapCurrentNodeId = mapPreviewNodeId;

    if (!mapVisitedNodeIds.includes(mapCurrentNodeId)) {
      mapVisitedNodeIds.push(mapCurrentNodeId);
    }

    const node = mapNodeLookup[mapCurrentNodeId];

    mapCursorX = node.x;
    mapCursorY = node.y;
    mapCursorTargetX = node.x;
    mapCursorTargetY = node.y;

    mapPreviewNodeId = null;

    // ✅ must confirm this node before unlocking next paths
    mapReachableNodeIds = [];

    return;
  }

  // =====================================
  // ✅ CASE 2: NO preview → confirm current node
  // =====================================
  if (!mapCompletedNodeIds.includes(mapCurrentNodeId)) {

    mapCompletedNodeIds.push(mapCurrentNodeId);

// ✅ ✅ ✅ EXECUTE NODE HERE
executeNode(mapCurrentNodeId);

    // ✅ unlock next row
    mapReachableNodeIds = mapNodeLookup[mapCurrentNodeId].connectsTo.slice();

    // ✅ auto-snap preview to first valid selectable node
    if (mapReachableNodeIds.length) {
      setMapPreview(mapReachableNodeIds[0]);
    }
  }
}

function executeNode(nodeId) {
  const node = mapNodeLookup[nodeId];
  if (!node) return;

  const levelKey = node.data?.resolvedLevel;
  const levelDef = LEVELS[levelKey];

  if (!levelDef) {
    console.warn('No resolved level found for node:', nodeId, node.data);
    return;
  }

  console.log('EXEC TYPE:', node.data?.resolvedType, 'LEVEL:', levelKey);

  // ✅ treasure can resolve immediately through its setup
  if (levelDef.type === 'treasure') {
    activeNodeId = nodeId;
    activeLevelKey = levelKey;
    activeLevelDef = levelDef;

    if (levelDef.setup) {
      levelDef.setup();
    }

    completeActiveLevel();
    return;
  }

  startLevelFromNode(nodeId);
}

function handleMapKey(e) {

  if (e.key === DPAD.BACK) {
    goToMenu();
    e.preventDefault();
    return;
  }

if (e.key === DPAD.LEFT || e.key === DPAD.RIGHT || e.key === DPAD.UP || e.key === DPAD.DOWN) {

  const current = mapPreviewNodeId
    ? mapNodeLookup[mapPreviewNodeId]
    : mapNodeLookup[mapCurrentNodeId];

  let bestNode = null;
  let bestScore = Infinity;

mapNodes.forEach(n => {

  if (n.id === current.id) return;

  const dx = n.x - current.x;
  const dy = n.y - current.y;

  let valid = false;

  // ✅ directional checks
  if (e.key === DPAD.LEFT && dx < 0) valid = true;
  if (e.key === DPAD.RIGHT && dx > 0) valid = true;
  if (e.key === DPAD.UP && dy < 0) valid = true;
  if (e.key === DPAD.DOWN && dy > 0) valid = true;

  if (!valid) return;

  let score;

  if (e.key === DPAD.LEFT || e.key === DPAD.RIGHT) {

    // ✅ STRONG ROW LOCK
    const ROW_BIAS = 2.5;

    score = Math.abs(dx) + Math.abs(dy) * ROW_BIAS;

  } else {

    // ✅ vertical movement stays natural
    const COL_BIAS = 0.5;

    score = Math.abs(dy) + Math.abs(dx) * COL_BIAS;
  }

  if (score < bestScore) {
    bestScore = score;
    bestNode = n;
  }
});

  if (bestNode) {
    setMapPreview(bestNode.id);
  }

  e.preventDefault();
  return;
}

if (e.key === DPAD.SELECT) {
  confirmMapAction();
  e.preventDefault();
  return;
}
}

  const r = Math.random();

  if (r < 0.88) return '#ff66cc';     // pink
  if (r < 0.95) return '#ffd400';     // yellow

      mode === 'perk_select'
    ) {

      let speedMultiplier = 1;

      if (mode === 'perk_select') {

    // normalize 0 → 1
    const breakDuration = a.breakDelay ?? 0.2;
breakT = 1 - (a.breakTimer / breakDuration);
    breakT = Math.max(0, Math.min(1, breakT));
  }

  // ✅ PULSE SCALE
  const pulseScale = 1 + breakT * 0.25;

  ctx.scale(pulseScale, pulseScale);

  // ✅ COLOR SHIFT (brighter during break)
let base = 200 + breakT * 55;

// ✅ APPLY HIT FLASH
base += a.hitFlash * 80;

if (base > 255) base = 255;

ctx.fillStyle = `rgba(${base},${base},${base},0.95)`;


  // ===================================
  // ✅ MAIN BODY
  // ===================================
  ctx.beginPath();
  ctx.arc(0, 0, a.w / 2, 0, Math.PI * 2);
  ctx.fill();

  // ===================================
  // ✅ ROTATION STRIPE
  // ===================================
  ctx.fillStyle = 'rgba(160,160,160,0.9)';

  const stripeWidth = a.w * 0.2;

  ctx.fillRect(
    -stripeWidth / 2,
    -a.h / 2,
    stripeWidth,
    a.h
  );

  // ===================================
  // ✅ CRACK LINES (ONLY DURING BREAK)
  // ===================================
  if (a.breaking) {

    ctx.strokeStyle = `rgba(255,255,255,${0.5 + breakT * 0.5})`;
    ctx.lineWidth = 2;

    ctx.beginPath();

    // center crack
    ctx.moveTo(0, 0);
    ctx.lineTo(a.w * 0.35, -a.h * 0.35);

    ctx.moveTo(0, 0);
    ctx.lineTo(-a.w * 0.3, a.h * 0.3);

    ctx.moveTo(0, 0);
    ctx.lineTo(a.w * 0.2, a.h * 0.4);

    ctx.stroke();
  }
ctx.restore();

// ===================================
// ✅ HP PIPS (WORLD-ALIGNED — NOT ROTATING)
// ===================================
const pipSize = 4;
const pipGap = 2;
const maxPerRow = 8;

ctx.fillStyle = '#ffffff';

for (let i = 0; i < a.hp; i++) {

  const row = Math.floor(i / maxPerRow);
  const col = i % maxPerRow;

  const rowCount = Math.min(a.hp - row * maxPerRow, maxPerRow);
  const totalW = rowCount * (pipSize + pipGap) - pipGap;

  const startX = a.x - totalW / 2;

  ctx.fillRect(
    startX + col * (pipSize + pipGap),
    a.y + (a.h / 2) + 6 + row * (pipSize + pipGap),
    pipSize,
    pipSize
  );
}

  ctx.restore();

} else {

    // ✅ normal asteroids unchanged
    ctx.fillStyle = 'rgba(200,200,200,0.95)';
    ctx.fillRect(a.x - a.w/2, a.y - a.h/2, a.w, a.h);

  }

});

// -----------------------------------
// ✅ MISSILE DRONES
// -----------------------------------
missileDrones.forEach(d => {
  ctx.save();

  const telegraphing = d.telegraphTimer > 0;
  const flash = telegraphing
    ? (0.6 + Math.sin(performance.now() * 0.03) * 0.4)
    : 0;

  // main body
  let bodyR = 120 + d.hitFlash * 100;
  let bodyG = 180 + d.hitFlash * 60;
  let bodyB = 255;

  if (bodyR > 255) bodyR = 255;
  if (bodyG > 255) bodyG = 255;

  ctx.fillStyle = `rgba(${bodyR},${bodyG},${bodyB},0.95)`;

  ctx.beginPath();
  ctx.moveTo(d.x, d.y - d.h / 2);
  ctx.lineTo(d.x + d.w / 2, d.y);
  ctx.lineTo(d.x, d.y + d.h / 2);
  ctx.lineTo(d.x - d.w / 2, d.y);
  ctx.closePath();
  ctx.fill();

  // telegraph glow
  if (telegraphing) {
    ctx.strokeStyle = `rgba(255,80,80,${flash})`;
    ctx.lineWidth = 3;
    ctx.strokeRect(d.x - d.w / 2 - 3, d.y - d.h / 2 - 3, d.w + 6, d.h + 6);
  }

  // HP pips
  const pipSize = 3;
  const pipGap = 2;

  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < d.hp; i++) {
    ctx.fillRect(
      d.x - ((d.hp * (pipSize + pipGap) - pipGap) / 2) + i * (pipSize + pipGap),
      d.y + d.h / 2 + 4,
      pipSize,
      pipSize
    );
  }

  ctx.restore();
});

// -----------------------------------
// ✅ ENEMY MISSILES
// -----------------------------------
enemyMissiles.forEach(m => {
  ctx.save();

  ctx.fillStyle = '#ff5555';
  ctx.fillRect(m.x - m.w / 2, m.y - m.h / 2, m.w, m.h);

  // ENEMIES
enemies.forEach(e => {

  ctx.save();

  if (e.telegraphTimer > 0 && e.willShift) {

    const offsetY = -18; // above enemy

    // 👉 LEFT ARROW
    if (e.shiftDir === -1) {
      ctx.beginPath();
      ctx.moveTo(-6, offsetY);
      ctx.lineTo(6, offsetY - 6);
      ctx.lineTo(6, offsetY + 6);
      ctx.closePath();
      ctx.fill();
    }

    // 👉 RIGHT ARROW
    else if (e.shiftDir === 1) {
      ctx.beginPath();
      ctx.moveTo(6, offsetY);
      ctx.lineTo(-6, offsetY - 6);
      ctx.lineTo(-6, offsetY + 6);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();
  }

  ctx.restore();
});

// -------- PICKUPS (GEMS) --------
pickups.forEach(p => {

  ctx.save();

  // ✅ pulse scale

  // ✅ glow intensity

  ctx.moveTo(0, -p.h/2);

  ctx.lineTo(0, p.h/2);

});

// -------- PICKUP BURSTS --------
pickupBursts.forEach(b => {

// -------- FLOATING XP TEXT --------
xpTexts.forEach(t => {

});

  // -------- AIM DETECTION --------
  const aimWindowPx = 14;

    let labelTop = "";

function markLevelObjectiveComplete() {
  levelObjectiveComplete = true;
}

function getAliveEnemyCount() {
  const livingEnemies = enemies.filter(e => e.alive).length;
  const livingAsteroids = asteroids.length;

  return livingEnemies + livingAsteroids;
}

function resetActiveLevelState() {
  activeNodeId = null;
  activeLevelKey = null;
  activeLevelDef = null;

  levelTimer = 0;
  levelObjectiveComplete = false;
}

function startLevelFromNode(nodeId) {
  const node = mapNodeLookup[nodeId];
  if (!node) return;

  const levelKey = node.data?.resolvedLevel;
  const levelDef = LEVELS[levelKey];

  if (!levelDef) {
    console.warn('Missing level def for node:', nodeId, levelKey);
    return;
  }

  activeNodeId = nodeId;
  activeLevelKey = levelKey;
  activeLevelDef = levelDef;

  levelObjectiveComplete = false;
  levelTimer = typeof levelDef.duration === 'number' ? levelDef.duration : 0;

  // ✅ start gameplay first (resets arena)
  startRun('game');

  // ✅ then apply level-specific setup
  if (levelDef.setup) {
    levelDef.setup();
  }
}

function isActiveLevelComplete() {
  if (!activeLevelDef) return false;

  const objective = activeLevelDef.objective;

  if (objective === 'kill_all_enemies') {
    return getAliveEnemyCount() <= 0;
  }

  if (objective === 'survive_timer') {
    return levelTimer <= 0;
  }

  if (objective === 'objective_complete') {
    return levelObjectiveComplete === true;
  }

  return false;
}

function completeActiveLevel() {
  if (!activeNodeId) {
    returnToMap();
    return;
  }

  console.log('LEVEL COMPLETE:', activeNodeId, activeLevelKey);

  resetActiveLevelState();
  returnToMap();
}

// =====================================
// ✅ BARRIER WALL HELPERS
//     Used by Barrier Gauntlet to spawn
//     perfectly spaced wall patterns.
// =====================================
function spawnBarrierWallAt(y, options = {}) {
  const wallId = options.wallId ?? 0;
  const gapLane = options.gapLane ?? Math.floor(Math.random() * GRID_LANES.length);
  const gapSize = options.gapSize ?? 2;
  const fall = options.fall ?? 0.4;

  const jobs = PatternRegistry.gapWall({
    type: 'barrier',
    y,
    fall,
    gapSize,
    gapLane
  });

  jobs.forEach((job, index) => {
    const obj = SpawnRegistry[job.type](job);
    if (!obj) return;

    obj._wallId = wallId;
    obj._wallGroup = 'barrier_gauntlet';
    obj._wallAnchor = (index === 0); // one object serves as the wall tracker

    asteroids.push(obj);
  });
}

function getBarrierWallAnchorY(wallId) {
  const anchor = asteroids.find(a =>
    a.type === 'barrier' &&
    a._wallGroup === 'barrier_gauntlet' &&
    a._wallId === wallId &&
    a._wallAnchor === true
  );

  return anchor ? anchor.y : null;
}

/* =========================================================
   ✅ LEVEL DEFINITIONS
========================================================= */

/* =========================================================
   ✅ LEVEL TYPE POOLS + WEIGHTED RESOLUTION
========================================================= */

// ✅ encounter type -> pool of level keys
const LEVEL_TYPE_POOLS = {
  combat: ['basic_combat'],
  elite: ['elite_combat'],
  treasure: ['treasure_room'],
  event: ['basic_combat'], // placeholder for now
  boss: ['boss_encounter'],
  asteroid: ['a_heavy_asteroid_single']
};

// ✅ pick one entry from weighted encounter list
function pickWeightedEncounter(encounters) {
  if (!Array.isArray(encounters) || !encounters.length) return null;

  let total = 0;
  encounters.forEach(e => {
    total += Math.max(0, Number(e.weight) || 0);
  });

  if (total <= 0) return null;

  let roll = Math.random() * total;

  for (const entry of encounters) {
    const w = Math.max(0, Number(entry.weight) || 0);
    if (roll < w) return entry;
    roll -= w;
  }

  return encounters[encounters.length - 1];
}

// ✅ pick one level key from a type pool
function pickLevelFromType(type) {
  const pool = LEVEL_TYPE_POOLS[type];
  if (!Array.isArray(pool) || !pool.length) return null;

  const idx = Math.floor(Math.random() * pool.length);
  return pool[idx];
}

// ✅ resolve every node once at run start
function resolveRandomizedNodeLevels() {
  mapNodes.forEach(node => {

    // ✅ start node does not execute a level
    if (node.type === 'start') {
      node.data.resolvedType = 'start';
      node.data.resolvedLevel = null;
      return;
    }

    // ✅ use weighted encounters if present
    let encounters = Array.isArray(node.data.encounters) && node.data.encounters.length
      ? node.data.encounters
      : [{ type: node.type, weight: 100 }]; // ✅ fallback = yes

    const pickedEncounter = pickWeightedEncounter(encounters);
    const resolvedType = pickedEncounter?.type || node.type;
    const resolvedLevel = pickLevelFromType(resolvedType);

    node.data.resolvedType = resolvedType;
    node.data.resolvedLevel = resolvedLevel;
  });
}

// =====================================
// ✅ SPAWN REGISTRY (CREATE ONE OBJECT)
// =====================================
const SpawnRegistry = {

barrier: (job = {}) => {
    return createBarrier(job);
  },

missile_drone: (job = {}) => {
    return createMissileDrone(job);
  },

  asteroid: (job = {}) => {
    const a = createAsteroid();

    if (job.laneIndex !== undefined) {
      a.x = GRID_LANES[clampLane(job.laneIndex)];
    }

    if (job.x !== undefined) a.x = job.x;
    if (job.y !== undefined) a.y = job.y;

    return a;
  },

  heavy_asteroid: (job = {}) => {
    return createHeavyAsteroid({
      laneIndex: job.laneIndex,
      x: job.x,
      y: job.y,
      w: job.w,
      h: job.h,
      hp: job.hp,
      fall: job.fall,
      spin: job.spin,
      breakDelay: job.breakDelay
    });
  },

  gem: (job = {}) => {
    const rarity = job.rarity ?? 'uncommon';
    const g = createGem(rarity);

    if (job.x !== undefined) g.x = job.x;
    else g.x = 40 + Math.random() * 520;

    if (job.y !== undefined) g.y = job.y;
    else g.y = -20;

    return g;
  }
};

// =====================================
// ✅ PATTERN REGISTRY (CREATE MANY JOBS)
//     Each pattern returns an array of spawn jobs.
// =====================================
const PatternRegistry = {

  // -----------------------------------
  // ✅ FULL WALL (fills all lanes)
  // -----------------------------------
  wall: (config = {}) => {
    const type = config.type ?? 'asteroid';
    const y = config.y ?? -20;

    return GRID_LANES.map((_, laneIndex) => ({
      type,
      laneIndex,
      y
    }));
  },

  // -----------------------------------
  // ✅ GAP WALL (all lanes except one)
  // -----------------------------------
gapWall: (config = {}) => {
  const type = config.type ?? 'asteroid';
  const y = config.y ?? -20;

  // ✅ NEW: how many lanes are open
  const gapSize = Math.max(1, config.gapSize ?? 1);

  // ✅ pick starting lane for the gap
  const startLane = (
    config.gapLane !== undefined
      ? clampLane(config.gapLane)
      : Math.floor(Math.random() * (GRID_LANES.length - gapSize + 1))
  );

  const jobs = [];

  for (let laneIndex = 0; laneIndex < GRID_LANES.length; laneIndex++) {

    // ✅ skip lanes inside the gap range
    if (laneIndex >= startLane && laneIndex < startLane + gapSize) {
      continue;
    }

    jobs.push({
      type,
      laneIndex,
      y
    });
  }

  return jobs;
},

  // -----------------------------------
  // ✅ ZIGZAG
  // Alternating lanes
  // -----------------------------------
  zigzag: (config = {}) => {
    const type = config.type ?? 'asteroid';
    const y = config.y ?? -20;
    const count = config.count ?? 4;

    const startParity = Math.random() < 0.5 ? 0 : 1;

    const candidateLanes = [];
    for (let i = startParity; i < GRID_LANES.length; i += 2) {
      candidateLanes.push(i);
    }

    const jobs = [];
    for (let i = 0; i < Math.min(count, candidateLanes.length); i++) {
      jobs.push({
        type,
        laneIndex: candidateLanes[i],
        y: y - i * 36
      });
    }

    return jobs;
  },

  // -----------------------------------
  // ✅ HEAVY CENTER
  // Heavy in center, optional supports
  // -----------------------------------
  heavyCenter: (config = {}) => {
    const centerLane = (
      config.centerLane !== undefined
        ? clampLane(config.centerLane)
        : Math.floor(GRID_LANES.length / 2)
    );

    const jobs = [
      {
        type: 'heavy_asteroid',
        laneIndex: centerLane,
        y: config.y ?? -80,
        hp: config.hp ?? 6,
        fall: config.fall ?? 0.45,
        w: config.w ?? 80,
        h: config.h ?? 80,
        spin: config.spin ?? 0.015,
        breakDelay: config.breakDelay ?? 0.2
      }
    ];

    if (config.supports !== false) {
      const supportType = config.supportType ?? 'asteroid';

      if (centerLane - 1 >= 0) {
        jobs.push({
          type: supportType,
          laneIndex: centerLane - 1,
          y: (config.y ?? -80) - 20
        });
      }

      if (centerLane + 1 < GRID_LANES.length) {
        jobs.push({
          type: supportType,
          laneIndex: centerLane + 1,
          y: (config.y ?? -80) - 20
        });
      }
    }

    return jobs;
  },

  // -----------------------------------
  // ✅ GEM FIELD
  // Free-floating, spread across width
  // -----------------------------------
  gemField: (config = {}) => {
    const count = config.count ?? 4;
    const rarity = config.rarity ?? 'uncommon';
    const y = config.y ?? -20;
    const minGap = config.minGap ?? 80;

    const jobs = [];
    const usedX = [];

    for (let i = 0; i < count; i++) {
      let x = 40 + Math.random() * 520;
      let safety = 0;

      while (usedX.some(px => Math.abs(px - x) < minGap) && safety < 20) {
        x = 40 + Math.random() * 520;
        safety++;
      }

      usedX.push(x);

      jobs.push({
        type: 'gem',
        x,
        y: y - i * 10,
        rarity,
        free: true
      });
    }

    return jobs;
  }
};

// =====================================
// ✅ SPAWN MANAGER (GENERIC)
// =====================================
const SpawnManager = {

  rules: [],
  timers: [],
  laneCooldowns: [],

  init(spawnRules = []) {
    this.rules = Array.isArray(spawnRules) ? spawnRules : [];
    this.timers = this.rules.map(() => 0);
    this.laneCooldowns = new Array(GRID_LANES.length).fill(0);
  },

  update(dt) {

    // ✅ reduce lane cooldowns
    for (let i = 0; i < this.laneCooldowns.length; i++) {
      this.laneCooldowns[i] -= dt;
    }

    // ✅ process rules
    for (let i = 0; i < this.rules.length; i++) {
      const rule = this.rules[i];
if (Number.isFinite(rule.maxAlive)) {
        const aliveCount = this.countAliveOfType(rule.type);
        if (aliveCount >= rule.maxAlive) {
          this.timers[i] = this.roll(rule.min, rule.max);
          continue;
        }
      }

      this.timers[i] -= dt;
      if (this.timers[i] > 0) continue;

      // ---------------------------------
      // ✅ SINGLE OBJECT RULE
      // ---------------------------------
      if (!rule.pattern) {
        const job = this.buildSingleJob(rule);
        if (job) {
          this.executeJob(job, rule);
        }
      }

      // ---------------------------------
      // ✅ PATTERN RULE
      // ---------------------------------
      else {
        const patternFunc = PatternRegistry[rule.pattern];
        if (patternFunc) {
          const jobs = patternFunc(rule.config || {});
          jobs.forEach(job => this.executeJob(job, rule));
        }
      }

      // reset timer after spawn attempt
      this.timers[i] = this.roll(rule.min, rule.max);
    }
  },

  buildSingleJob(rule) {
    const job = {
      type: rule.type,
      y: rule.y
    };

    if (!rule.free) {
      const lane = this.getFreeLane();
      if (lane === null) return null;
      job.laneIndex = lane;
    } else {
      job.x = rule.x;
    }

    if (rule.config) {
      Object.assign(job, rule.config);
    }

    return job;
  },

  executeJob(job, rule = {}) {
    if (!job || !job.type) return;

    // ✅ apply lane cooldown for lane-based spawns
    if (job.laneIndex !== undefined) {
      const lane = clampLane(job.laneIndex);

      // If lane is cooling down and rule wants spacing, skip
      if (!rule.ignoreCooldown && this.laneCooldowns[lane] > 0) {
        return;
      }

      this.laneCooldowns[lane] = rule.cooldown ?? 0.8;
    }

    const spawnFunc = SpawnRegistry[job.type];
    if (!spawnFunc) return;

    const obj = spawnFunc(job);
    if (!obj) return;

    this.addToWorld(obj);
  },



addToWorld(obj) {
  if (!obj) return;

  if (
    obj.type === 'asteroid' ||
    obj.type === 'heavy_asteroid' ||
    obj.type === 'barrier'
  ) {
    asteroids.push(obj);
    return;
  }

  if (obj.type === 'gem') {
    pickups.push(obj);
    return;
  }

  if (obj.type === 'missile_drone') {
    missileDrones.push(obj);
    return;
  }

  if (obj.type === 'enemy') {
    enemies.push(obj);
    return;
  }
},

  getFreeLane() {
    const valid = [];

    for (let i = 0; i < this.laneCooldowns.length; i++) {
      if (this.laneCooldowns[i] <= 0) {
        valid.push(i);
      }
    }

    if (!valid.length) return null;
    return valid[Math.floor(Math.random() * valid.length)];
  },

countAliveOfType(type) {
    if (type === 'missile_drone') return missileDrones.length;
    if (type === 'gem') return pickups.filter(p => p.type === 'gem').length;
    if (type === 'enemy') return enemies.length;

    if (
      type === 'asteroid' ||
      type === 'heavy_asteroid' ||
      type === 'barrier'
    ) {
      return asteroids.filter(a => a.type === type).length;
    }

    return 0;
  },


roll(min, max) {
    const a = Number.isFinite(min) ? min : 1;
    const b = Number.isFinite(max) ? max : a;
    return a + Math.random() * Math.max(0, b - a);
  }
};

/* =================================================================================================================================================================================================================================
   ✅ LEVELS

const LEVELS = {

    clearAllEntities();

    // =====================================
    // ✅ WALL SPACING STATE
    // =====================================
    level._wallState = {
      spawnY: -40,          // where runtime walls enter
      startY: 220,          // first visible wall at level start
      wallSpacing: 220,     // ✅ THIS is now the true spacing knob
      fallSpeed: 0.4,
      gapSize: 2,
      preSpawnCount: 3,
      nextWallId: 1,
      lastWallId: null
    };

    const state = level._wallState;

    // =====================================
    // ✅ PRE-SPAWN WALL STACK
    // =====================================
    for (let i = 0; i < state.preSpawnCount; i++) {
      const wallId = state.nextWallId++;
      const y = state.startY - i * state.wallSpacing;

      spawnBarrierWallAt(y, {
        wallId,
        gapLane: Math.floor(Math.random() * GRID_LANES.length),
        gapSize: state.gapSize,
        fall: state.fallSpeed
      });

      // newest wall = the topmost one
      state.lastWallId = wallId;
    }
  },

  update: (dt) => {
    const state = activeLevelDef?._wallState;
    if (!state) return;

    const lastY = getBarrierWallAnchorY(state.lastWallId);

    // if anchor not found, skip this frame
    if (lastY == null) return;

    // =====================================
    // ✅ SPAWN NEXT WALL WHEN LAST WALL HAS
    //     FALLEN FAR ENOUGH
    // =====================================
    if (lastY >= state.spawnY + state.wallSpacing) {
      const wallId = state.nextWallId++;

      spawnBarrierWallAt(state.spawnY, {
        wallId,
        gapLane: Math.floor(Math.random() * GRID_LANES.length),
        gapSize: state.gapSize,
        fall: state.fallSpeed
      });

      state.lastWallId = wallId;
    }

},

      {

function startRun(runMode){
  running = true;
SpawnManager.init(activeLevelDef?.spawnRules || []);
  resetRunState();

if (runMode === 'debug_asteroid') {
  asteroidSpawnTimer = 0.1; // spawn almost immediately
}
if (runMode === 'game') {
  asteroidSpawnTimer = 1.0; // game spawn delay
}

  centerGamma = rawGamma;

  if (
    runMode === 'debug_power' ||
    runMode === 'debug_vel' ||
    runMode === 'debug_cap' ||
    runMode === 'debug_reload'
  ) {
    powerUpSpawnTimer = 10;
  }
previousMode = runMode
  setMode(runMode);
}

/* =========================================================
   ✅ CORE GAME LOOP (REAL TIME / DELTA TIME + ONSCREEN ERRORS)
========================================================= */
let lastTime = performance.now();
let lastRuntimeError = "";

function update(now){
  try {
    // ✅ REAL dt in seconds
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    // clear any previous error once we successfully tick
    lastRuntimeError = "";

    // ✅ movement always ticks
    updateMovement(dt);

    // ✅ perk timeline progress
    if (mode === 'perk_select') {
      perkTimeline += dt;
    }

updateStars(dt);
updateXPBar(dt);
updateMapCursor(dt);

    // =====================================
    // ✅ PERK CINEMATIC
    // =====================================
    if (mode === 'perk_select') {

      // --- Phase 1: slow warp-in
      if (perkTimeline < 0.25) {
        perkWarpRamp = perkTimeline / 0.4;
        perkEnterBoost = 0;
      }

      // --- Phase 2: tiny pause / hold
      else if (perkTimeline < 0.4) {
        perkWarpRamp = 1;
        perkEnterBoost = 0;
      }

      // --- Phase 3: slow acceleration
      else {
        perkWarpRamp = 1;
        perkEnterBoost += dt * 3;
        if (perkEnterBoost > 1) perkEnterBoost = 1;
      }

      // ✅ Start flash once warp phase has had time to happen
      if (perkTimeline > 0.65 && !flashTriggered) {
        flashTriggered = true;
        flashValue = 0;
        flashPhase = 1;
      }

      if (!uiRevealed && flashValue >= FLASH_MAX) {
        uiRevealed = true;
        gameplayHiddenForPerk = true;

        ui.panel.classList.remove('hidden');
        ui.perkRow.classList.remove('hidden');
        ui.btnReroll.classList.remove('hidden');
        ui.hud.classList.remove('hidden');

        renderPerkUI();
        ui.perk2.focus();
        setTimeout(ensureFocus, 0);
      }
    }

    // =====================================
    // ✅ FLASH UPDATE SYSTEM
    // =====================================
    if (flashPhase === 1) {
      flashValue += dt * FLASH_FADE_IN;

      if (flashValue >= FLASH_MAX) {
        flashValue = FLASH_MAX;
        flashPhase = 2;
      }

    } else if (flashPhase === 2) {
      flashValue -= dt * FLASH_FADE_OUT;

      if (flashValue <= 0) {
        flashValue = 0;
        flashPhase = 0;
      }
    }

    if (ui.flash) {
      ui.flash.style.opacity = flashValue;
    }

// =====================================
    // ✅ GAMEPLAY UPDATES (MODE GATED)
    // =====================================
if (running && !isPaused) {
if (activeLevelDef?.spawnRules) {
  SpawnManager.update(dt);
}

  // ✅ level timer countdown (for survive_timer objective)
  if (activeLevelDef && activeLevelDef.objective === 'survive_timer') {
    levelTimer -= dt;
    if (levelTimer < 0) levelTimer = 0;
  }

// ✅ LEVEL-SPECIFIC UPDATE (CUSTOM LOGIC)
if (activeLevelDef && typeof activeLevelDef.update === 'function') {
  activeLevelDef.update(dt);
}

  updateWeapons(dt);
updateMissileDrones(dt);

  // ✅ ENEMIES ONLY
  if (mode === 'game' || mode === 'debug_enemy') {
    updateEnemies(dt);
    handleBulletsVsEnemies();
  }

  // ✅ ASTEROIDS ONLY
  if (mode === 'game' || mode === 'debug_asteroid') {
    updateAsteroids(dt);
  }

  // ✅ POWERUPS ONLY
  if (
    mode === 'game' ||
    mode === 'debug_power' ||
    mode === 'debug_vel' ||
    mode === 'debug_cap' ||
    mode === 'debug_reload'
  ) {
    updatePowerUps(dt);
  }

  // ✅ PICKUPS ONLY IN FULL GAME
  if (mode === 'game') {
    updatePickups(dt);
  }

  // ✅ PICKUP BURSTS
  pickupBursts.forEach(b => {
    b.x += b.vx * dt * 60;
    b.y += b.vy * dt * 60;
    b.life -= dt;
  });
  pickupBursts = pickupBursts.filter(b => b.life > 0);

  // ✅ XP FLOAT TEXT
  xpTexts.forEach(t => {
    t.y += t.vy * dt * 60;
    t.x += t.drift * dt * 60;
    t.life -= dt;
  });
  xpTexts = xpTexts.filter(t => t.life > 0);

  // ✅ REAL LEVEL COMPLETION CHECK
  if (activeLevelDef && isActiveLevelComplete()) {
    completeActiveLevel();
    refreshStatUI();
    renderTopUI();
    draw();
    requestAnimationFrame(update);
    return;
  }
}

    // ✅ UI + DRAW
    refreshStatUI();
    renderTopUI();
    draw();

  } catch (err) {
    lastRuntimeError = (err && err.message) ? err.message : String(err);
    console.error("Game error:", err);

    try { draw(); } catch(e) {}
  }

  requestAnimationFrame(update);
}

// ✅ start loop ONCE (delete any other requestAnimationFrame(update) lines elsewhere)
buildMap();              // ✅ BUILD MAP ON INITIAL LOAD
initStars();             // ✅ create stars BEFORE first frame
setMode('menu');         // ✅ set UI first
requestAnimationFrame(update); // ✅ THEN start loop

function renderTopUI() {

  if (!ui.topUI) return;

  const xpRequired = getXPRequiredFor(displayLevel);
  const progress = (xpRequired > 0) ? (displayXP / xpRequired) : 0;

  const barColor =
    (xpBarState === 'flash' || mode === 'perk_select')
      ? '#ffd400'
      : '#00d4ff';

  ui.topUI.innerHTML = `
    <div style="position:absolute; top:0; left:0; width:100%;">

      <!-- BAR BACKGROUND -->
      <div style="
        height:10px;
        background: rgba(255,255,255,0.15);
        position: relative;
      ">

        <!-- BAR FILL -->
        <div style="
          height:100%;
          width:${Math.max(0, Math.min(1, progress)) * 100}%;
          background:${barColor};
        "></div>

      </div>

      <!-- LEVEL TEXT -->
      <div style="
        position:absolute;
        top:14px;
        left:6px;
        font:14px monospace;
        color:white;
      ">
        Lv ${displayLevel}
      </div>

      <!-- LEVEL UP TEXT -->
      ${mode === 'perk_select' ? `
        <div style="
          position:absolute;
          top:16px;
          width:100%;
          text-align:center;
          font:20px monospace;
          color:#ffd400;
        ">
          LEVEL UP
        </div>
      ` : ''}

    </div>
  `;
}

// =====================================================
// ✅ BUILD DEBUG LEVEL DROPDOWN
// =====================================================
function buildDebugLevelDropdown() {

  const select = ui.debugLevelSelect;
  if (!select) return;

  select.innerHTML = '';

  const levelKeys = Object.keys(LEVELS).sort((a, b) => a.localeCompare(b));

  levelKeys.forEach(levelKey => {
    const option = document.createElement('option');
    option.value = levelKey;
    option.textContent = levelKey;
    select.appendChild(option);
  });

  if (levelKeys.length > 0) {
    select.value = levelKeys[0];
  }
}

  isPaused = false;

  // ✅ return to the mode we were in before pausing
  if (typeof previousMode === 'string' && previousMode.startsWith('debug_')) {
    setMode(previousMode);
  } else {
    setMode('game');
  }
});

  exitToMenu();
});

ui.perk1.addEventListener('click', () => pickPerk(0));

  setMode('debugMenu');

  ui.status.textContent = 'DEBUG: XP OFF (press ` to enable)';

  startLevelDirect(selectedLevel);

ui.btnDbgBack.addEventListener('click', () => setMode('menu'));
