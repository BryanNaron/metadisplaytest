<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>TiltGala Prototype</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#101216;
      --panel2:#1c1e21;
      --text:#e8f6ff;
      --dim:#8fb8c7;
      --cyan:#00d4ff;
      --red:#ff3355;
      --yellow:#ffd400;
      --white:#ffffff;
    }

    html, body {
      width: 600px;
      height: 600px;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #app { position: relative; width: 600px; height: 600px; }
    canvas { display:block; width:600px; height:600px; background:var(--bg); }

    #hud {
      position:absolute;
      top:0; left:0; right:0;
      padding: 10px 12px;
      display:flex;
      justify-content: space-between;
      gap: 8px;
      pointer-events:none;
    }

    .pill {
      background: rgba(16,18,22,0.78);
      border: 1px solid rgba(0,212,255,0.25);
      box-shadow: 0 0 14px rgba(0,212,255,0.12);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 16px;
      line-height: 1;
      white-space: nowrap;
    }

    .pill strong { color: var(--cyan); font-weight: 900; }

    #panel {
      position:absolute;
      left:16px; right:16px; bottom:16px;
      background: rgba(16,18,22,0.84);
      border: 1px solid rgba(0,212,255,0.30);
      border-radius: 18px;
      box-shadow: 0 0 22px rgba(0,212,255,0.16);
      padding: 12px;
    }

    #title { margin:0 0 6px 0; font-size:22px; font-weight:900; letter-spacing:0.2px; }
    #subtitle { margin:0 0 10px 0; font-size:14px; color:var(--dim); }

    .row {
      display:flex;
      gap:10px;
      flex-wrap: wrap;
    }

    .focusable {
      min-height: 88px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 2px solid transparent;
      background: rgba(28,30,33,0.92);
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      flex: 1 1 45%;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
    }

    .focusable:focus {
      outline:none;
      border-color: var(--cyan);
      box-shadow: 0 0 22px rgba(0,212,255,0.45);
    }

    .focusable[disabled]{ opacity:0.45; }

    .hidden { display:none !important; }
  </style>
</head>

<body>
<div id="app">
  <canvas id="c" width="600" height="600"></canvas>

<div id="hud">
  <!-- LEFT: Player Stats -->
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div class="pill">Score <strong id="score">0</strong></div>
    <div class="pill">FireRate <strong id="fd">0</strong></div>
    <div class="pill">Bullet Velocity <strong id="bs">0</strong></div>
    <div class="pill">Capacity <strong id="bc">0</strong></div>
    <div class="pill">Reload <strong id="rt">0</strong></div> <!-- ✅ NEW -->
  </div>

  <!-- RIGHT: Status -->
  <div class="pill">
    <span id="status">Menu</span>
  </div>
</div>

  <div id="panel">
    <p id="title">TiltGala</p>
    <p id="subtitle">Enable motion. Tilt to move. Auto-fire. Shoot yellow +FR powerups (5 hits). ESC backs out.</p>

    <div class="row" id="menuRow">
      <button id="btnEnable" class="focusable">Enable Motion</button>
      <button id="btnCal" class="focusable" disabled>Calibrate</button>
      <button id="btnStart" class="focusable" disabled>Start Game</button>
      <button id="btnDebug" class="focusable">Debug Mode</button>
    </div>

<div class="row hidden" id="debugRow">
  <button id="btnDbgMove" class="focusable">Test Movement</button>
  <button id="btnDbgWeapon" class="focusable">Test Weapon</button>
  <button id="btnDbgEnemy" class="focusable">Test Enemies</button>

  <button id="btnDbgPower" class="focusable">Test Powerups (Fire Rate)</button>
  <button id="btnDbgVel" class="focusable">Test Powerups (Bullet Velocity)</button>
  <button id="btnDbgCap" class="focusable">Test Powerups (Capacity)</button>
<button id="btnDbgReload" class="focusable">Test Powerups (Reload)</button>

  <button id="btnDbgBack" class="focusable">Back</button>
</div>
  </div>
</div>

<script>
/* =========================================================
   ✅ INPUT SYSTEM
========================================================= */
const DPAD = {
  UP: 'ArrowUp', DOWN: 'ArrowDown',
  LEFT: 'ArrowLeft', RIGHT: 'ArrowRight',
  SELECT: 'Enter', BACK: 'Escape',
};

const ui = {
  canvas: document.getElementById('c'),

  score: document.getElementById('score'),
  fd: document.getElementById('fd'),
  bs: document.getElementById('bs'),
  bc: document.getElementById('bc'),
  rt: document.getElementById('rt'),

  status: document.getElementById('status'),

  panel: document.getElementById('panel'),
  menuRow: document.getElementById('menuRow'),
  debugRow: document.getElementById('debugRow'),

  btnEnable: document.getElementById('btnEnable'),
  btnCal: document.getElementById('btnCal'),
  btnStart: document.getElementById('btnStart'),
  btnDebug: document.getElementById('btnDebug'),

  btnDbgMove: document.getElementById('btnDbgMove'),
  btnDbgWeapon: document.getElementById('btnDbgWeapon'),
  btnDbgEnemy: document.getElementById('btnDbgEnemy'),

  btnDbgPower: document.getElementById('btnDbgPower'),
  btnDbgVel: document.getElementById('btnDbgVel'),
  btnDbgCap: document.getElementById('btnDbgCap'),

  btnDbgReload: document.getElementById('btnDbgReload'), // ✅ THIS IS STEP 4

  btnDbgBack: document.getElementById('btnDbgBack'),
};

const ctx = ui.canvas.getContext('2d', { alpha:true });

let hasIMU = false;
let running = false;

let mode = 'menu';
// menu | debugMenu | game | debug_move | debug_weapon | debug_enemy | debug_power | debug_vel | debug_cap | debug_reload

let rawGamma = 0;
let centerGamma = 0;
let smoothGamma = 0; // ✅ NEW (gyro smoothing)

let keyLeft = false;
let keyRight = false;

function visibleFocusables(){
  return Array.from(document.querySelectorAll('.focusable:not([disabled]):not(.hidden)'));
}

function ensureFocus(){
  if (ui.panel.classList.contains('hidden')) return;
  const ae = document.activeElement;
  const ok = ae && ae.classList && ae.classList.contains('focusable') && !ae.disabled && !ae.classList.contains('hidden');
  if (!ok) {
    const list = visibleFocusables();
    if (list.length) list[0].focus();
  }
}

function moveFocus(step){
  const list = visibleFocusables();
  if (!list.length) return;
  const idx = list.indexOf(document.activeElement);
  const next = idx === -1 ? 0 : (idx + step + list.length) % list.length;
  list[next].focus();
}

document.addEventListener('keydown', (e) => {
  if (e.key === DPAD.LEFT || e.key === 'a' || e.key === 'A') keyLeft = true;
  if (e.key === DPAD.RIGHT || e.key === 'd' || e.key === 'D') keyRight = true;

  if (running) {
    if (e.key === DPAD.BACK) {
      exitToMenu();
      e.preventDefault();
      return;
    }
    return;
  }

  ensureFocus();

  if (e.key === DPAD.UP || e.key === DPAD.LEFT) {
    moveFocus(-1);
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.DOWN || e.key === DPAD.RIGHT) {
    moveFocus(1);
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.SELECT) {
    const ae = document.activeElement;
    if (ae && ae.classList && ae.classList.contains('focusable')) ae.click();
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.BACK && mode === 'debugMenu') {
    goToMenu();
    e.preventDefault();
    return;
  }
});

document.addEventListener('keyup', (e) => {
  if (e.key === DPAD.LEFT || e.key === 'a' || e.key === 'A') keyLeft = false;
  if (e.key === DPAD.RIGHT || e.key === 'd' || e.key === 'D') keyRight = false;
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) setTimeout(ensureFocus, 0);
});

setInterval(ensureFocus, 1000);

async function requestMotionPermission(){
  try {
    let ok = true;

    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const state = await DeviceOrientationEvent.requestPermission();
      ok = ok && (state === 'granted');
    }

    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      const state2 = await DeviceMotionEvent.requestPermission();
      ok = ok && (state2 === 'granted');
    }

    if (ok) startIMU();
    else ui.status.textContent = 'IMU Denied';
  } catch (err) {
    startIMU();
  }
}

function startIMU(){
  window.addEventListener('deviceorientation', (e) => {
    if (typeof e.gamma === 'number') rawGamma = e.gamma;
  }, true);

  hasIMU = true;
  ui.status.textContent = 'IMU On';
  ui.btnCal.disabled = false;
  ui.btnStart.disabled = false;

  ui.btnCal.focus();
  setTimeout(() => ui.btnCal.focus(), 0);
}

function calibrate(){
  centerGamma = rawGamma;
  ui.status.textContent = 'Calibrated';
  ui.btnStart.focus();
  setTimeout(() => ui.btnStart.focus(), 0);
}

/* =========================================================
   ✅ MOVEMENT SYSTEM
========================================================= */
let playerX = 300;

function updateMovement(){

  const raw = (rawGamma - centerGamma);

  // ✅ DEADZONE
  let input = raw;

  const deadzone = 5; // ✅ tune this (try 2–5)

  if (Math.abs(input) < deadzone) {
    input = 0;
  } else {
    // shrink input just outside deadzone
    input = input - Math.sign(input) * deadzone;
  }

  input *= 0.05; // sensitivity scale

  const keyMove = (keyRight ? 1 : 0) - (keyLeft ? 1 : 0);

  const vx = input * 8 + keyMove * 6;

  playerX = Math.max(20, Math.min(580, playerX + vx));
}

/* =========================================================
   ✅ WEAPON SYSTEM (REAL TIME RELOAD)
========================================================= */

let weapon = {
  baseFireDelay: 95,
  baseBulletSpeed: 4.5,
  baseMagSize: 6,
  baseReloadTime: 180, // still stored in frames (we convert later)

  bonusFireDelay: 0,
  bonusBulletSpeed: 0,
  bonusMagSize: 0,
  bonusReloadTime: 0
};

let bullets = [];
let fireTimer = 0; // still frame-based (we’ll leave it for now)

let ammoInMag = 0;
let isReloading = false;
let reloadTimer = 0; // ✅ NOW IN SECONDS

function getFireDelay(){
  return Math.max(3, Math.round(
    weapon.baseFireDelay - weapon.bonusFireDelay
  ));
}

function getBulletSpeed(){
  return weapon.baseBulletSpeed + weapon.bonusBulletSpeed;
}

function getMagSize(){
  return Math.max(1, Math.round(
    weapon.baseMagSize + weapon.bonusMagSize
  ));
}

function getReloadTime(){
  return Math.max(10, Math.round(
    weapon.baseReloadTime - weapon.bonusReloadTime
  ));
}

// ✅ START RELOAD (convert once to seconds)
function startReload(){
  if (isReloading) return;

  isReloading = true;

  // convert frames → seconds
  reloadTimer = getReloadTime() / 60;
}

function finishReload(){
  isReloading = false;
  ammoInMag = getMagSize();
}

function initWeaponState(){
  ammoInMag = getMagSize();
  isReloading = false;
  reloadTimer = 0;
  fireTimer = 0;

  weapon.bonusFireDelay = 0;
  weapon.bonusBulletSpeed = 0;
  weapon.bonusMagSize = 0;
  weapon.bonusReloadTime = 0;
}

// ---------- POWERUP HOOKS ----------
function applyFireRateBoost(v){ weapon.bonusFireDelay += v; }
function applyBulletVelocityBoost(v){ weapon.bonusBulletSpeed += v; }

function applyCapacityBoost(v){
  weapon.bonusMagSize += v;
  ammoInMag = Math.min(getMagSize(), ammoInMag + v);
}

function applyReloadBoost(v){
  weapon.bonusReloadTime += v;
}

// ---------- ✅ MAIN UPDATE (REAL TIME RELOAD) ----------
function updateWeapons(dt){

  const spd = getBulletSpeed();

  bullets.forEach(b => {
    b.y -= spd;
    b.x += b.vx;
  });

  bullets = bullets.filter(
    b => b.y > -20 && b.x > -40 && b.x < 640
  );

  // ✅ REAL TIME RELOAD
  if (isReloading) {
    reloadTimer -= dt;

    if (reloadTimer <= 0) {
      finishReload();
    }
    return;
  }

  if (ammoInMag <= 0) {
    startReload();
    return;
  }

  fireTimer--;

  if (fireTimer <= 0) {
    fire();
    fireTimer = getFireDelay();
  }
}

function fire(){
  if (ammoInMag <= 0 || isReloading) return;

  bullets.push({ x: playerX, y: 520, vx: 0 });
  ammoInMag--;

  if (ammoInMag <= 0) startReload();
}
/* =========================================================
   ✅ ENEMY SYSTEM
========================================================= */
let enemies = [];
let score = 0;

function spawnEnemies(){
  enemies = [];
  for (let i = 0; i < 6; i++) {
    enemies.push({ x: 100 + i * 70, y: 90, w: 24, h: 16, alive: true });
  }
}

function updateEnemies(){
  enemies.forEach(e => {
    if (!e.alive) return;
    e.y += 0.35;
    if (e.y > 610) e.y = 90;
  });
}

function handleBulletsVsEnemies(){
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    for (let ei = 0; ei < enemies.length; ei++) {
      const e = enemies[ei];
      if (!e.alive) continue;
      const hit =
        b.x >= (e.x - e.w/2) && b.x <= (e.x + e.w/2) &&
        b.y >= (e.y - e.h/2) && b.y <= (e.y + e.h/2);
      if (hit) {
        bullets.splice(bi, 1);
        e.alive = false;
        score += 10;
        ui.score.textContent = score;
        break;
      }
    }
  }
}

/* =========================================================
   ✅ POWER-UP SYSTEM (ALL STATS)
========================================================= */

let powerUps = [];
let powerUpSpawnTimer = 0;
let wave = 1;

let powerUpSpeedRange = { min: 0.2, max: 0.5 };

let fireRatePowerRange = { min: 5, max: 15 };
let bulletVelPowerRange = { min: 0.5, max: 1.5 };
let capacityPowerRange  = { min: 1, max: 4 };
let reloadPowerRange    = { min: 20, max: 60 };

// ✅ UTILS (MISSING BEFORE — CRITICAL)
function randRange(min, max){
  return min + Math.random() * (max - min);
}

function randInt(min, max){
  return Math.floor(min + Math.random() * (max - min + 1));
}

function computeHPFromPower(value, type){

  let baseHP = 1;

  if (type === 'stat_fireRate') baseHP = value * 0.6;
  if (type === 'stat_bulletVel') baseHP = value * 6;

  if (type === 'stat_capacity'){
    const currentMag = getMagSize();
    baseHP = 4 + (value * 3 * (currentMag / 6));
  }

  if (type === 'stat_reload'){
    const currentReload = getReloadTime();
    const scale = currentReload / 300;
    baseHP = 5 + value * 0.2 * scale;
  }

  return Math.max(1, Math.round(baseHP));
}

// ✅ CREATE FUNCTIONS (THESE WERE MISSING — CAUSED CRASH)

function createFireRatePower(){
  const v = randRange(fireRatePowerRange.min, fireRatePowerRange.max);
  return {
    type: 'stat_fireRate',
    x: 40 + Math.random() * 520,
    y: -20,
    w: 34,
    h: 24,
    hp: computeHPFromPower(v, 'stat_fireRate'),
    power: v,
    fall: randRange(powerUpSpeedRange.min, powerUpSpeedRange.max)
  };
}

function createBulletVelPower(){
  const v = randRange(bulletVelPowerRange.min, bulletVelPowerRange.max);
  return {
    type: 'stat_bulletVel',
    x: 40 + Math.random() * 520,
    y: -20,
    w: 34,
    h: 24,
    hp: computeHPFromPower(v, 'stat_bulletVel'),
    power: v,
    fall: randRange(powerUpSpeedRange.min, powerUpSpeedRange.max)
  };
}

function createCapacityPower(){
  const v = randInt(capacityPowerRange.min, capacityPowerRange.max);
  return {
    type: 'stat_capacity',
    x: 40 + Math.random() * 520,
    y: -20,
    w: 34,
    h: 24,
    hp: computeHPFromPower(v, 'stat_capacity'),
    power: v,
    fall: randRange(powerUpSpeedRange.min, powerUpSpeedRange.max)
  };
}

function createReloadPower(){
  const v = randRange(reloadPowerRange.min, reloadPowerRange.max);
  return {
    type: 'stat_reload',
    x: 40 + Math.random() * 520,
    y: -20,
    w: 34,
    h: 24,
    hp: computeHPFromPower(v, 'stat_reload'),
    power: v,
    fall: randRange(powerUpSpeedRange.min, powerUpSpeedRange.max)
  };
}

// ✅ SPAWN
function spawnStatPowerUp(){

  if (mode === 'debug_power') {
    powerUps.push(createFireRatePower());
    return;
  }

  if (mode === 'debug_vel') {
    powerUps.push(createBulletVelPower());
    return;
  }

  if (mode === 'debug_cap') {
    powerUps.push(createCapacityPower());
    return;
  }

  if (mode === 'debug_reload') {
    powerUps.push(createReloadPower());
    return;
  }

  // game random
  const r = Math.random();

  if (r < 0.25) powerUps.push(createFireRatePower());
  else if (r < 0.5) powerUps.push(createBulletVelPower());
  else if (r < 0.75) powerUps.push(createCapacityPower());
  else powerUps.push(createReloadPower());
}

// ✅ UPDATE
function updatePowerUps(){
  powerUpSpawnTimer--;

  if (powerUpSpawnTimer <= 0) {
    spawnStatPowerUp();
    powerUpSpawnTimer = 120;
  }

  powerUps.forEach(p => p.y += p.fall);
  powerUps = powerUps.filter(p => p.y < 640);

  handleBulletsVsPowerUps();
}

function handleBulletsVsPowerUps(){
  for (let pi = powerUps.length - 1; pi >= 0; pi--) {
    const p = powerUps[pi];

    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];

      const hit =
        b.x >= (p.x - p.w/2) && b.x <= (p.x + p.w/2) &&
        b.y >= (p.y - p.h/2) && b.y <= (p.y + p.h/2);

      if (hit) {
        bullets.splice(bi, 1);
        p.hp--;

        if (p.hp <= 0) {
          grantPowerUp(p);
          powerUps.splice(pi, 1);
        }
        break;
      }
    }
  }
}

function grantPowerUp(p){

  if (p.type === 'stat_fireRate')   applyFireRateBoost(p.power);
  if (p.type === 'stat_bulletVel')  applyBulletVelocityBoost(p.power);
  if (p.type === 'stat_capacity')   applyCapacityBoost(p.power);
  if (p.type === 'stat_reload')     applyReloadBoost(p.power);

  score += 100;
  ui.score.textContent = score;
}

/* =========================================================
   ✅ RENDER SYSTEM
========================================================= */
function draw(){
  ctx.clearRect(0, 0, 600, 600);

  ctx.strokeStyle = 'rgba(0,212,255,0.10)';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, 10, 580, 580);

  const playerY = 540;

  // PLAYER
  ctx.fillStyle = '#00d4ff';
  ctx.fillRect(playerX - 10, playerY, 20, 10);

  // -------- AMMO UI --------
  const ammoW = 3;
  const ammoH = 5;
  const ammoGap = 2;
  const ammoMaxPerRow = 16;

  const currentAmmo = ammoInMag;
  const maxAmmo = getMagSize();

  const ammoTopY = 560;

  for (let i = 0; i < maxAmmo; i++) {
    const row = Math.floor(i / ammoMaxPerRow);
    const col = i % ammoMaxPerRow;

    const rowCount = Math.min(maxAmmo - row * ammoMaxPerRow, ammoMaxPerRow);
    const totalW = rowCount * (ammoW + ammoGap) - ammoGap;
    const startX = playerX - totalW / 2;

    ctx.fillStyle = (i < currentAmmo) ? '#ffffff' : 'rgba(255,255,255,0.25)';

    ctx.fillRect(
      startX + col * (ammoW + ammoGap),
      ammoTopY + row * (ammoH + ammoGap),
      ammoW,
      ammoH
    );
  }

  // -------- RELOAD BAR (MATCH AMMO WIDTH, ALWAYS VISIBLE) --------
  const firstRowCount = Math.min(maxAmmo, ammoMaxPerRow);
  const ammoRowWidth = firstRowCount * (ammoW + ammoGap) - ammoGap;
  const ammoStartX = playerX - ammoRowWidth / 2;

  const barHeight = 2;
  const barX = ammoStartX;
  const barY = ammoTopY - 6;
  const barWidth = ammoRowWidth;

// -------- RELOAD BAR --------
let reloadProgress = 1;

if (isReloading) {
  // convert current reload duration to seconds
  const totalReload = getReloadTime() / 60;

  reloadProgress = 1 - (reloadTimer / totalReload);
}

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(barX, barY, barWidth, barHeight);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(barX, barY, barWidth * reloadProgress, barHeight);

  // BULLETS
  ctx.fillStyle = '#ffffff';
  bullets.forEach(b => ctx.fillRect(b.x - 2, b.y, 4, 10));

  // ENEMIES
  ctx.fillStyle = '#ff3355';
  enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
  });

  // -------- AIM DETECTION (OUTLINE ONLY) --------
  const aimWindowPx = 14;
  let aimedIndex = -1;
  let bestDx = Infinity;

  for (let i = 0; i < powerUps.length; i++) {
    const p = powerUps[i];
    if (p.y > playerY) continue;

    const dx = Math.abs(p.x - playerX);
    if (dx <= aimWindowPx && dx < bestDx) {
      bestDx = dx;
      aimedIndex = i;
    }
  }

  // -------- POWERUPS (WITH LABELS + HP) --------
  powerUps.forEach((p, idx) => {
    const isAimed = (idx === aimedIndex);

    ctx.save();

    // body
    ctx.fillStyle = '#ffd400';
    ctx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);

    // subtle outline when aimed
    if (isAimed) {
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 1;
      ctx.strokeRect(
        p.x - p.w/2 - 1,
        p.y - p.h/2 - 1,
        p.w + 2,
        p.h + 2
      );
    }

    // LABEL (two-line, flat values)
    let labelTop = "";
    let labelBottom = "";

    if (p.type === 'stat_fireRate') {
  labelTop = "FR";
  labelBottom = "+" + Math.round(p.power);

} else if (p.type === 'stat_bulletVel') {
  labelTop = "BV";
  labelBottom = "+" + Number(p.power).toFixed(1);

} else if (p.type === 'stat_capacity') {
  labelTop = "CP";
  labelBottom = "+" + Math.round(p.power);

} else if (p.type === 'stat_reload') {
  labelTop = "RL";
  labelBottom = "-" + Math.round(p.power); // ✅ NEW
}

    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    let fontSize = 10;
    const maxWidth = p.w - 6;
    ctx.font = fontSize + 'px monospace';

    // shrink if needed
    while (
      (ctx.measureText(labelTop).width > maxWidth ||
       ctx.measureText(labelBottom).width > maxWidth) &&
      fontSize > 7
    ){
      fontSize--;
      ctx.font = fontSize + 'px monospace';
    }

    ctx.fillText(labelTop, p.x, p.y - 6);
    ctx.fillText(labelBottom, p.x, p.y + 6);

    // HEALTH GRID (centered per row)
    ctx.fillStyle = '#fff';
    const pip = 3;
    const gap = 2;
    const maxPerRow = 7;

    for (let i = 0; i < p.hp; i++) {
      const row = Math.floor(i / maxPerRow);
      const col = i % maxPerRow;

      const rowCount = Math.min(p.hp - row * maxPerRow, maxPerRow);
      const totalW = rowCount * (pip + gap) - gap;
      const startX = p.x - totalW / 2;

      ctx.fillRect(
        startX + col * (pip + gap),
        p.y + p.h/2 + 4 + row * (pip + gap + 1),
        pip,
        pip
      );
    }

    ctx.restore();
  });

  // -------- PLAYER STATS UI --------

  // Fire Rate: scaled integer, no decimals
  const delay = getFireDelay();
  const rps = 60 / delay;
  ui.fd.textContent = Math.round(rps * 100);

  // Bullet Velocity
  ui.bs.textContent = getBulletSpeed().toFixed(1);

  // Capacity
  ui.bc.textContent = getMagSize();

  // Reload Time (seconds)
  ui.rt.textContent = (getReloadTime() / 60).toFixed(1);
}
/* =========================================================
   ✅ MODE / NAV + RUN START (REQUIRED FOR DEBUG MENU)
========================================================= */

function resetRunState(){
  bullets = [];
  fireTimer = 0;

  enemies = [];
  powerUps = [];
  powerUpSpawnTimer = 60;

  score = 0;
  ui.score.textContent = score;

  initWeaponState();
}

function setMode(nextMode){
  mode = nextMode;
  ui.status.textContent = nextMode;

  ui.menuRow.classList.add('hidden');
  ui.debugRow.classList.add('hidden');

  if (nextMode === 'menu') {
    ui.panel.classList.remove('hidden');
    ui.menuRow.classList.remove('hidden');

    ui.btnEnable.focus();
    setTimeout(ensureFocus, 0);
    return;
  }

  if (nextMode === 'debugMenu') {
    ui.panel.classList.remove('hidden');
    ui.debugRow.classList.remove('hidden');

    ui.btnDbgMove.focus();
    setTimeout(ensureFocus, 0);
    return;
  }

  ui.panel.classList.add('hidden');
}

function goToMenu(){
  running = false;
  resetRunState();
  setMode('menu');
}

function exitToMenu(){
  goToMenu();
}

function startRun(runMode){
  running = true;

  resetRunState();
  centerGamma = rawGamma;

  if (runMode === 'game') spawnEnemies();
  if (runMode === 'debug_enemy') spawnEnemies();

  if (
    runMode === 'debug_power' ||
    runMode === 'debug_vel' ||
    runMode === 'debug_cap' ||
    runMode === 'debug_reload'
  ) {
    powerUpSpawnTimer = 10;
  }

  setMode(runMode);
}

/* =========================================================
   ✅ CORE GAME LOOP (REAL TIME / DELTA TIME)
========================================================= */
let lastTime = performance.now();

function update(now){
  try {
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    // movement always updates
    updateMovement();

    if (running) {
      // weapons always update in any run mode
      updateWeapons(dt);

      if (mode === 'game' || mode === 'debug_enemy') {
        updateEnemies();
        handleBulletsVsEnemies();
      }

      if (
        mode === 'game' ||
        mode === 'debug_power' ||
        mode === 'debug_vel' ||
        mode === 'debug_cap' ||
        mode === 'debug_reload'
      ) {
        updatePowerUps();
      }
    }

    draw();

  } catch (err) {
    console.error("Game error:", err);
  }

  requestAnimationFrame(update);
}

requestAnimationFrame(update);

/* =========================================================
   ✅ UI WIRING
========================================================= */
ui.btnEnable.addEventListener('click', async () => {
  await requestMotionPermission();
});

ui.btnCal.addEventListener('click', () => calibrate());
ui.btnStart.addEventListener('click', () => startRun('game'));

// ✅ THIS IS WHAT OPENS THE DEBUG MENU
ui.btnDebug.addEventListener('click', () => setMode('debugMenu'));

ui.btnDbgMove.addEventListener('click', () => startRun('debug_move'));
ui.btnDbgWeapon.addEventListener('click', () => startRun('debug_weapon'));
ui.btnDbgEnemy.addEventListener('click', () => startRun('debug_enemy'));

ui.btnDbgPower.addEventListener('click', () => startRun('debug_power'));
ui.btnDbgVel.addEventListener('click', () => startRun('debug_vel'));
ui.btnDbgCap.addEventListener('click', () => startRun('debug_cap'));
ui.btnDbgReload.addEventListener('click', () => startRun('debug_reload'));

ui.btnDbgBack.addEventListener('click', () => setMode('menu'));

// initial focus
ui.btnEnable.focus();

requestAnimationFrame(update);
</script>
