<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slot Machine - Physics Particles</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.machine {
    background: #222;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 30px gold;
    width: 420px;
    position: relative;
    overflow: hidden;
}

h1 {
    color: gold;
    margin: 0 0 15px;
}

.slots {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 25px 0;
}

.slot {
    width: 85px;
    height: 85px;
    background: #333;
    border: 3px solid gold;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 42px;
}

.spinning {
    filter: blur(1px);
}

button {
    background: gold;
    color: black;
    border: none;
    padding: 12px 20px;
    margin: 4px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

button:disabled {
    background: #666;
}

#message {
    margin-top: 15px;
    min-height: 24px;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="machine">
    <h1>🎰 Physics Particle Slots 🎰</h1>

    <canvas id="fx" width="420" height="300"></canvas>

    <div class="slots">
        <div class="slot" id="s1">❔</div>
        <div class="slot" id="s2">❔</div>
        <div class="slot" id="s3">❔</div>
    </div>

    <button id="spinBtn">SPIN</button>

    <p>Credits: <span id="credits">100</span></p>

    <div>
        <button onclick="setSkin('classic')">Classic</button>
        <button onclick="setSkin('fire')">Fire 🔥</button>
        <button onclick="setSkin('ice')">Ice ❄️</button>
        <button onclick="setSkin('gem')">Gem 💎</button>
        <button onclick="setSkin('spooky')">Spooky 👻</button>
    </div>

    <div id="message"></div>
</div>

<script>
/* ---------------- SKINS ---------------- */

const skins = {
    classic: ["🍒","🍋","⭐","💎","7️⃣"],
    fire:    ["🔥","🌶️","⭐","💥","7️⃣"],
    ice:     ["❄️","🧊","⭐","💎","7️⃣"],
    gem:     ["💎","💎","⭐","💍","7️⃣"],
    spooky:  ["👻","🕷️","🎃","💀","7️⃣"]
};

let currentSkin = "classic";

/* ---------------- STATE ---------------- */

let credits = 100;
let spinning = false;

/* ---------------- ELEMENTS ---------------- */

const spinBtn = document.getElementById("spinBtn");
const s1 = document.getElementById("s1");
const s2 = document.getElementById("s2");
const s3 = document.getElementById("s3");
const creditsEl = document.getElementById("credits");
const messageEl = document.getElementById("message");

const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");

let particles = [];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/* ---------------- AUDIO ---------------- */

function tone(f,d,t="sine",v=0.08){
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    o.type = t;
    o.frequency.value = f;
    g.gain.value = v;

    o.connect(g);
    g.connect(audioCtx.destination);

    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
    o.stop(audioCtx.currentTime + d);
}

function spinSound(){
    let i = 0;
    const r = setInterval(()=>{
        tone(180 + Math.random()*200,0.04,"square",0.04);
        if(++i > 14) clearInterval(r);
    },70);
}

function winSound(amount){
    if(amount >= 50){
        tone(523,0.12,"triangle");
        setTimeout(()=>tone(659,0.12,"triangle"),100);
        setTimeout(()=>tone(784,0.18,"triangle"),200);
        setTimeout(()=>tone(1047,0.25,"triangle"),300);
    } else {
        tone(520,0.1,"triangle",0.06);
        setTimeout(()=>tone(660,0.1,"triangle",0.06),100);
    }
}

function loseSound(){
    tone(180,0.15,"sawtooth",0.06);
    setTimeout(()=>tone(120,0.2,"sawtooth",0.05),120);
}

function coinSound(){
    tone(1200,0.03,"square",0.05);
}

/* ---------------- PHYSICS PARTICLES ---------------- */

const GRAVITY = 0.28;
const BOUNCE = 0.6;

function spawnParticles(x, y, count){
    for(let i = 0; i < count; i++){
        particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 2) * 6,
            size: 3 + Math.random() * 2,
            life: 140
        });
    }
}

const bounds = {
    left: 0,
    right: 420,
    top: 0,
    bottom: 300
};

function loopParticles(){
    ctx.clearRect(0,0,420,300);

    for(let p of particles){

        // gravity
        p.vy += GRAVITY;

        // movement
        p.x += p.vx;
        p.y += p.vy;

        // floor bounce (reel base)
        if(p.y > bounds.bottom - 45){
            p.y = bounds.bottom - 45;
            p.vy *= -BOUNCE;
            p.vx *= 0.85;
        }

        // walls
        if(p.x < bounds.left){
            p.x = bounds.left;
            p.vx *= -BOUNCE;
        }
        if(p.x > bounds.right){
            p.x = bounds.right;
            p.vx *= -BOUNCE;
        }

        // fade
        p.life--;

        ctx.fillStyle = "gold";
        ctx.fillRect(p.x, p.y, p.size, p.size);
    }

    particles = particles.filter(p => p.life > 0);

    requestAnimationFrame(loopParticles);
}

loopParticles();

/* ---------------- SHAKE ---------------- */

function shake(intensity=8,duration=300){
    const m = document.querySelector(".machine");
    const start = Date.now();

    const i = setInterval(()=>{
        let t = Date.now()-start;

        if(t > duration){
            clearInterval(i);
            m.style.transform = "translate(0,0)";
            return;
        }

        m.style.transform =
        `translate(${(Math.random()-0.5)*intensity}px,
                   ${(Math.random()-0.5)*intensity}px)`;
    },16);
}

/* ---------------- CORE ---------------- */

function getSymbols(){
    return skins[currentSkin];
}

function randomSymbol(){
    const arr = getSymbols();
    return arr[Math.floor(Math.random()*arr.length)];
}

function update(){
    creditsEl.textContent = credits;
}

/* ---------------- PHYSICS REELS ---------------- */

function startPhysicsReel(el){
    let index = Math.random()*5;
    let velocity = 38 + Math.random()*10;

    const loop = setInterval(()=>{

        index += velocity;
        velocity *= 0.93;

        el.textContent = getSymbols()[Math.floor(index)%getSymbols().length];

        if(velocity < 0.5){
            velocity *= 0.98;
        }

    },16);

    return {
        stop(finalSymbol){
            clearInterval(loop);
            el.textContent = finalSymbol;
        }
    };
}

/* ---------------- SKINS ---------------- */

function setSkin(name){
    currentSkin = name;
    messageEl.textContent = `🎨 Skin: ${name}`;
}

/* ---------------- REWARD FX (CRESCENDO) ---------------- */

function rewardFX(amount){
    spawnParticles(210,120,Math.min(120,20+amount*2));
    shake(4+amount*0.2,300+amount*5);

    let i = 0;

    const interval = setInterval(()=>{

        credits += 1;
        update();

        tone(500 + i*30,0.04,"square",0.05);
        coinSound();

        spawnParticles(
            210 + (Math.random()-0.5)*20,
            120 + (Math.random()-0.5)*20,
            2
        );

        i++;

        if(i >= amount){
            clearInterval(interval);
            tone(1200,0.08,"triangle",0.06);
            spawnParticles(210,120,40);
        }

    },40);
}

/* ---------------- SPIN ---------------- */

function spin(){
    if(spinning || credits <= 0) return;

    if(audioCtx.state === "suspended") audioCtx.resume();

    spinning = true;
    credits -= 10;
    update();
    spinBtn.disabled = true;
    messageEl.textContent = "";

    spinSound();

    const a = randomSymbol();
    const b = randomSymbol();
    const c = randomSymbol();

    const r1 = startPhysicsReel(s1);
    const r2 = startPhysicsReel(s2);
    const r3 = startPhysicsReel(s3);

    setTimeout(()=>r1.stop(a),900);
    setTimeout(()=>r2.stop(b),1400);

    setTimeout(()=>{

        r3.stop(c);

        let win = 0;

        if(a===b && b===c){
            win = 50;
            messageEl.textContent = "🎉 TRIPLE MATCH +50";
        }
        else if(a===b || b===c || a===c){
            win = 10;
            messageEl.textContent = "✨ DOUBLE MATCH +10";
        }
        else {
            loseSound();
            messageEl.textContent = "Try again!";
        }

        if(win > 0){
            winSound(win);
            rewardFX(win);
        }

        spinning = false;
        spinBtn.disabled = false;

    },2000);
}

spinBtn.addEventListener("click", spin);
</script>

</body>
</html>
