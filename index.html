<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>TiltGala Prototype</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#101216;
      --panel2:#1c1e21;
      --text:#e8f6ff;
      --dim:#8fb8c7;
      --cyan:#00d4ff;
      --red:#ff3355;
      --yellow:#ffd400;
      --white:#ffffff;
    }

    html, body {
      width: 600px;
      height: 600px;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #app { position: relative; width: 600px; height: 600px; }
    canvas { display:block; width:600px; height:600px; background:var(--bg); }

#hud {
  position:absolute;
  top:0;
  left:0;
  right:0;
  transition: top 0.15s ease; /* ✅ smooth shift */
}

    .pill {
      background: rgba(16,18,22,0.78);
      border: 1px solid rgba(0,212,255,0.25);
      box-shadow: 0 0 14px rgba(0,212,255,0.12);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 16px;
      line-height: 1;
      white-space: nowrap;
    }

    .pill strong { color: var(--cyan); font-weight: 900; }

    #panel {
      position:absolute;
      left:16px; right:16px; bottom:16px;
      background: rgba(16,18,22,0.84);
      border: 1px solid rgba(0,212,255,0.30);
      border-radius: 18px;
      box-shadow: 0 0 22px rgba(0,212,255,0.16);
      padding: 12px;
    }

    #title { margin:0 0 6px 0; font-size:22px; font-weight:900; letter-spacing:0.2px; }
    #subtitle { margin:0 0 10px 0; font-size:14px; color:var(--dim); }

    .row {
      display:flex;
      gap:10px;
      flex-wrap: wrap;
    }

    .focusable {
      min-height: 88px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 2px solid transparent;
      background: rgba(28,30,33,0.92);
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      flex: 1 1 100%;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
    }

    .focusable:focus {
      outline:none;
      border-color: var(--cyan);
      box-shadow: 0 0 22px rgba(0,212,255,0.45);
    }

    .focusable[disabled]{ opacity:0.45; }

    .hidden { display:none !important; }
.hideInPerk {
  display: none;
}
  </style>
</head>

<body>
<div id="app">
  <canvas id="c" width="600" height="600"></canvas>

<div id="hud" class="hidden">
  <!-- LEFT: Player Stats -->
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div class="pill">Score <strong id="score">0</strong></div>
    <div class="pill">FireRate <strong id="fd">0</strong></div>
    <div class="pill">Bullet Velocity <strong id="bs">0</strong></div>
    <div class="pill">Capacity <strong id="bc">0</strong></div>
    <div class="pill">Reload <strong id="rt">0</strong></div> <!-- ✅ NEW -->
  </div>

  <!-- RIGHT: Status -->
  <div class="pill">
    <span id="status">Menu</span>
  </div>
</div>

<div id="panel">
<p id="title" class="panelText">TiltGala</p>
<p id="subtitle" class="panelText">Swipe to move lanes.</p>

  <div class="row" id="menuRow">
    <button id="btnStart" class="focusable">Start Game</button>
    <button id="btnDebug" class="focusable">Debug Mode</button>
  </div>

  <div class="row hidden" id="debugRow">
    <button id="btnDbgEnemy" class="focusable">Test Enemies</button>
    <button id="btnDbgAsteroid" class="focusable">Test Enemy (Asteroid)</button>
    <button id="btnDbgMove" class="focusable">Test Movement</button>
    <button id="btnDbgWeapon" class="focusable">Test Weapon</button>

    <button id="btnDbgPower" class="focusable">Test Powerups (Fire Rate)</button>
    <button id="btnDbgVel" class="focusable">Test Powerups (Bullet Velocity)</button>
    <button id="btnDbgCap" class="focusable">Test Powerups (Capacity)</button>
    <button id="btnDbgReload" class="focusable">Test Powerups (Reload)</button>

    <button id="btnDbgBack" class="focusable">Back</button>
  </div>

  <!-- ✅ MOVE THIS OUTSIDE debugRow -->
  <div class="row hidden" id="pauseRow">
    <button id="btnResume" class="focusable">Resume</button>
    <button id="btnExit" class="focusable">Exit</button>
  </div>

<div class="row hidden" id="perkRow" style="flex-direction: column;">
  <button id="perk1" class="focusable"></button>
  <button id="perk2" class="focusable"></button>
  <button id="perk3" class="focusable"></button>
</div>
</div>

<script>
/* =========================================================
   ✅ INPUT SYSTEM
========================================================= */
const DPAD = {
  UP: 'ArrowUp', DOWN: 'ArrowDown',
  LEFT: 'ArrowLeft', RIGHT: 'ArrowRight',
  SELECT: 'Enter', BACK: 'Escape',
};

const ui = {
  canvas: document.getElementById('c'),

  score: document.getElementById('score'),
  fd: document.getElementById('fd'),
  bs: document.getElementById('bs'),
  bc: document.getElementById('bc'),
  rt: document.getElementById('rt'),

hud: document.getElementById('hud'),

pauseRow: document.getElementById('pauseRow'),
btnResume: document.getElementById('btnResume'),
btnExit: document.getElementById('btnExit'),

  status: document.getElementById('status'),

  panel: document.getElementById('panel'),
  menuRow: document.getElementById('menuRow'),
  debugRow: document.getElementById('debugRow'),

  btnStart: document.getElementById('btnStart'),
  btnDebug: document.getElementById('btnDebug'),

  btnDbgMove: document.getElementById('btnDbgMove'),
  btnDbgWeapon: document.getElementById('btnDbgWeapon'),
  btnDbgEnemy: document.getElementById('btnDbgEnemy'),
btnDbgAsteroid: document.getElementById('btnDbgAsteroid'),

  btnDbgPower: document.getElementById('btnDbgPower'),
  btnDbgVel: document.getElementById('btnDbgVel'),
  btnDbgCap: document.getElementById('btnDbgCap'),

  btnDbgReload: document.getElementById('btnDbgReload'), // ✅ THIS IS STEP 4

  btnDbgBack: document.getElementById('btnDbgBack'),

perkRow: document.getElementById('perkRow'),
perk1: document.getElementById('perk1'),
perk2: document.getElementById('perk2'),
perk3: document.getElementById('perk3'),

};

const ctx = ui.canvas.getContext('2d', { alpha:true });

let hasIMU = false;
let running = false;
let isPaused = false;

let mode = 'menu';
// menu | debugMenu | game | paused | debug_move | debug_weapon | debug_enemy | debug_asteroid | debug_power | debug_vel | debug_cap | debug_reload

let rawGamma = 0;
let centerGamma = 0;
let smoothGamma = 0; // ✅ NEW (gyro smoothing)

let keyLeft = false;
let keyRight = false;

function visibleFocusables(){
  return Array.from(document.querySelectorAll('.focusable:not([disabled]):not(.hidden)'));
}

function ensureFocus(){
  if (ui.panel.classList.contains('hidden')) return;
  const ae = document.activeElement;
  const ok = ae && ae.classList && ae.classList.contains('focusable') && !ae.disabled && !ae.classList.contains('hidden');
  if (!ok) {
    const list = visibleFocusables();
    if (list.length) list[0].focus();
  }
}

function moveFocus(step){
  const list = visibleFocusables();
  if (!list.length) return;
  const idx = list.indexOf(document.activeElement);
  const next = idx === -1 ? 0 : (idx + step + list.length) % list.length;
  list[next].focus();
}

// =========================================================
// ✅ INPUT (GRID LANES ONLY — NO DASH)
// Replace: keydown + keyup + touchstart + touchend
// =========================================================
document.addEventListener('keydown', (e) => {

  // =========================
  // ✅ GAME INPUT
  // =========================
if (running && mode !== 'perk_select') {

  // ✅ TOGGLE PAUSE
  if (e.key === DPAD.UP) {
    isPaused = !isPaused;

    if (isPaused) {
      setMode('paused');
    } else {
      setMode('game');
    }

    e.preventDefault();
    return;
  }

  // ✅ IF PAUSED → SKIP GAME INPUT BUT ALLOW MENU INPUT BELOW
  if (!isPaused) {

    // ✅ movement
    if (e.key === DPAD.LEFT || e.key === 'a' || e.key === 'A') {
      stepLane(-1);
      e.preventDefault();
      return;
    }

    if (e.key === DPAD.RIGHT || e.key === 'd' || e.key === 'D') {
      stepLane(+1);
      e.preventDefault();
      return;
    }

    if (e.key === DPAD.BACK) {
      exitToMenu();
      e.preventDefault();
      return;
    }

    return;
  }
}

  // =========================
  // ✅ MENU NAVIGATION
  // =========================
  ensureFocus();

  if (e.key === DPAD.UP || e.key === DPAD.LEFT) {
    moveFocus(-1);
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.DOWN || e.key === DPAD.RIGHT) {
    moveFocus(1);
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.SELECT) {
    const ae = document.activeElement;
    if (ae && ae.classList && ae.classList.contains('focusable')) {
      ae.click();
    }
    e.preventDefault();
    return;
  }

  if (e.key === DPAD.BACK && mode === 'debugMenu') {
    goToMenu();
    e.preventDefault();
    return;
  }
});document.addEventListener('keyup', (e) => {
  if (e.key === DPAD.LEFT || e.key === 'a' || e.key === 'A') keyLeft = false;
  if (e.key === DPAD.RIGHT || e.key === 'd' || e.key === 'D') keyRight = false;
});

// -------- SWIPE INPUT (LANE STEP) --------
let touchStartX = 0;
let touchStartTime = 0;

document.addEventListener('touchstart', (e) => {
  if (!running) return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartTime = performance.now();
});

document.addEventListener('touchend', (e) => {
  if (!running) return;

  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dt = (performance.now() - touchStartTime) / 1000;

  const minSwipeDist = 25;
  const maxSwipeTime = 0.30;

  if (Math.abs(dx) > minSwipeDist && dt < maxSwipeTime) {
    if (dx > 0) stepLane(+1);
    else stepLane(-1);
  }
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) setTimeout(ensureFocus, 0);
});

setInterval(ensureFocus, 1000);

async function requestMotionPermission(){
  try {
    let ok = true;

    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const state = await DeviceOrientationEvent.requestPermission();
      ok = ok && (state === 'granted');
    }

    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      const state2 = await DeviceMotionEvent.requestPermission();
      ok = ok && (state2 === 'granted');
    }

    if (ok) startIMU();
    else ui.status.textContent = 'IMU Denied';
  } catch (err) {
    startIMU();
  }
}

function startIMU(){
  window.addEventListener('deviceorientation', (e) => {
    if (typeof e.gamma === 'number') rawGamma = e.gamma;
  }, true);

  hasIMU = true;
  ui.status.textContent = 'IMU On';
  ui.btnCal.disabled = false;
  ui.btnStart.disabled = false;

  ui.btnCal.focus();
  setTimeout(() => ui.btnCal.focus(), 0);
}

function calibrate(){
  centerGamma = rawGamma;
  ui.status.textContent = 'Calibrated';
  ui.btnStart.focus();
  setTimeout(() => ui.btnStart.focus(), 0);
}

/* =========================================================
   ✅ GRID / LANE SYSTEM (ADJUSTABLE)
========================================================= */

// ✅ change this ONE number later if you want more/less columns
let GRID_COLS = 8;

// ✅ usable horizontal space for lanes (tune these if you want wider margins)
let GRID_LEFT_X  = 60;
let GRID_RIGHT_X = 540;

// derived lane centers
let GRID_LANES = [];

function rebuildGridLanes(){
  GRID_LANES = [];
  if (GRID_COLS < 2) GRID_COLS = 2;

  const span = (GRID_RIGHT_X - GRID_LEFT_X);
  const step = span / (GRID_COLS - 1);

  for (let i = 0; i < GRID_COLS; i++) {
    GRID_LANES.push(GRID_LEFT_X + step * i);
  }
}

// call once on load
rebuildGridLanes();

// random lane center (for enemies/powerups)
function getRandomLaneX(){
  return GRID_LANES[Math.floor(Math.random() * GRID_LANES.length)];
}

// nearest lane index for an x position
function nearestLaneIndex(x){
  let best = 0;
  let bestDist = Math.abs(x - GRID_LANES[0]);

  for (let i = 1; i < GRID_LANES.length; i++) {
    const d = Math.abs(x - GRID_LANES[i]);
    if (d < bestDist) {
      bestDist = d;
      best = i;
    }
  }
  return best;
}

// clamp lane index
function clampLane(i){
  return Math.max(0, Math.min(GRID_COLS - 1, i));
}
/* =========================================================
   ✅ MOVEMENT SYSTEM (GRID STYLE ONLY)
========================================================= */
let playerY = 540;

// ✅ lane-based player state
let playerLane = Math.floor(GRID_COLS / 2);
let playerX = GRID_LANES[playerLane];

// ✅ smooth visual glide between lanes (not analog movement)
let laneLerpSpeed = 18; // higher = snappier (try 14–24)

// ✅ dash (lane jump animation)
let dashTimer = 0;
let dashCooldown = 0;

const DASH_LANES = 1;        // ✅ dash moves this many lanes (1 = one column)
const DASH_TIME = 0.08;      // dash animation duration in seconds
const DASH_COOLDOWN = 0.35;  // seconds

let dashStartX = 0;
let dashTargetX = 0;

// ✅ gyro-to-lane tuning
const GYRO_DEADZONE = 5;     // degrees-ish feel (you already like 5)
const GYRO_MAX = 20;         // tilt that maps to edge lanes (try 18–28)
const GYRO_HYSTERESIS = 0.12; // prevents jitter lane flipping (0.08–0.18)

// gyro lane smoothing
let desiredLane = playerLane;

// ✅ Helper: step lanes
function stepLane(dir){
  playerLane = clampLane(playerLane + dir);
  desiredLane = playerLane;
}

function isPlayerCenteredInLane(){
  const targetX = GRID_LANES[playerLane];
  const threshold = 2; // ✅ pixels tolerance (tune 1–4)

  return Math.abs(playerX - targetX) <= threshold;
}

// ✅ Dash now means "jump lanes"
function dashLeft(){
  if (dashCooldown > 0) return;

  const targetLane = clampLane(playerLane - DASH_LANES);

  dashStartX = playerX;
  dashTargetX = GRID_LANES[targetLane];

  playerLane = targetLane; // commit lane
  desiredLane = playerLane;

  dashTimer = DASH_TIME;
  dashCooldown = DASH_COOLDOWN;
}

function dashRight(){
  if (dashCooldown > 0) return;

  const targetLane = clampLane(playerLane + DASH_LANES);

  dashStartX = playerX;
  dashTargetX = GRID_LANES[targetLane];

  playerLane = targetLane;
  desiredLane = playerLane;

  dashTimer = DASH_TIME;
  dashCooldown = DASH_COOLDOWN;
}

function updateMovement(dt){

  // ✅ debug_move: ONLY keyboard lane stepping, no gyro influence
  if (mode === 'debug_move' || mode === 'game') {
    const targetX = GRID_LANES[playerLane];
    playerX += (targetX - playerX) * Math.min(1, laneLerpSpeed * dt);

    if (dashCooldown > 0) dashCooldown -= dt;
    if (dashTimer > 0) dashTimer -= dt;

    return;
  }

  if (dashTimer > 0) {
    dashTimer -= dt;
    const t = 1 - (dashTimer / DASH_TIME);
    playerX = dashStartX + (dashTargetX - dashStartX) * t;
  } else {
    const targetX = GRID_LANES[playerLane];
    playerX += (targetX - playerX) * Math.min(1, laneLerpSpeed * dt);
  }

  if (dashCooldown > 0) dashCooldown -= dt;
}

// ✅ ✅ ✅ ADD THIS RIGHT HERE (outside the function)
let wasCenteredLastFrame = true;
/* =========================================================
   ✅ WEAPON SYSTEM (REAL TIME RELOAD)
========================================================= */

let weapon = {
  baseFireDelay: 95,
  baseBulletSpeed: 4.5,
  baseMagSize: 6,
  baseReloadTime: 180, // still stored in frames (we convert later)

  bonusFireDelay: 0,
  bonusBulletSpeed: 0,
  bonusMagSize: 0,
  bonusReloadTime: 0
};

let bullets = [];
let fireTimer = 0; // still frame-based (we’ll leave it for now)

let ammoInMag = 0;
let isReloading = false;
let reloadTimer = 0; // ✅ NOW IN SECONDS

function getFireDelay(){
  return Math.max(3, Math.round(
    weapon.baseFireDelay - weapon.bonusFireDelay
  ));
}

function getBulletSpeed(){
  return weapon.baseBulletSpeed + weapon.bonusBulletSpeed;
}

function getMagSize(){
  return Math.max(1, Math.round(
    weapon.baseMagSize + weapon.bonusMagSize
  ));
}

function getReloadTime(){
  return Math.max(10, Math.round(
    weapon.baseReloadTime - weapon.bonusReloadTime
  ));
}

// ✅ START RELOAD (convert once to seconds)
function startReload(){
  if (isReloading) return;

  isReloading = true;

  // convert frames → seconds
  reloadTimer = getReloadTime() / 60;
}

function finishReload(){
  isReloading = false;
  ammoInMag = getMagSize();

  // ✅ FIX: fire immediately after reload
  fireTimer = 0;
}

function initWeaponState(){
  ammoInMag = getMagSize();
  isReloading = false;
  reloadTimer = 0;
  fireTimer = 0;

  weapon.bonusFireDelay = 0;
  weapon.bonusBulletSpeed = 0;
  weapon.bonusMagSize = 0;
  weapon.bonusReloadTime = 0;
}

// ---------- POWERUP HOOKS ----------
function applyFireRateBoost(v){ weapon.bonusFireDelay += v; }
function applyBulletVelocityBoost(v){ weapon.bonusBulletSpeed += v; }

function applyCapacityBoost(v){
  weapon.bonusMagSize += v;
  ammoInMag = Math.min(getMagSize(), ammoInMag + v);
}

function applyReloadBoost(v){
  weapon.bonusReloadTime += v;
}

// ---------- ✅ MAIN UPDATE (REAL TIME RELOAD) ----------
function updateWeapons(dt){

  const spd = getBulletSpeed();

bullets.forEach(b => {
  b.y -= spd * dt * 60;
  b.x += b.vx * dt * 60;
});

  bullets = bullets.filter(
    b => b.y > -20 && b.x > -40 && b.x < 640
  );

  // ✅ REAL TIME RELOAD
  if (isReloading) {
    reloadTimer -= dt;

    if (reloadTimer <= 0) {
      finishReload();
    }
    return;
  }

  if (ammoInMag <= 0) {
    startReload();
    return;
  }

  fireTimer -= dt;




if (fireTimer <= 0) {

  if (isPlayerCenteredInLane()) {
    fire();
    fireTimer = getFireDelay() / 60;
  }

  // ✅ IMPORTANT: do NOT reset timer if not centered
}
}

function fire(){

  // ✅ prevent firing while between lanes
  if (!isPlayerCenteredInLane()) return;

  if (ammoInMag <= 0 || isReloading) return;

  bullets.push({ x: playerX, y: 520, vx: 0 });
  ammoInMag--;

  if (ammoInMag <= 0) startReload();
}
/* =========================================================
   ✅ LEVEL / XP SYSTEM (TOTAL XP + LEVEL XP + ANIMATED BAR)
========================================================= */

// Total XP (never resets except on new run) – this is what your pause HUD "Score" shows.
let score = 0;

// Logical level + XP toward next level (gameplay truth)
let logicLevel = 1;
let levelXP = 0;

// Displayed level + animated XP (UI truth)
let displayLevel = 1;
let displayXP = 0;

// XP bar animation state machine
let xpBarState = 'normal'; // 'normal' | 'fill' | 'flash' | 'spill'
let xpFlashTimer = 0;      // seconds
let pendingDisplayLevels = 0;

// tuning (feel)
const XP_FILL_SPEED = 80;   // XP per second while forcing to 100%
const XP_LERP_SPEED = 10;    // lerp speed during normal/spill (6–14)
const XP_FLASH_TIME = 0.18;  // yellow flash duration

function getXPRequiredFor(level){
  // ✅ easier early leveling (tune as needed)
  // L1->2: 50, L2->3: 70, L3->4: 90...
  return Math.floor(30 + level * 20);
}

// Call this whenever you award XP.
// This updates TOTAL XP immediately, updates LOGICAL level immediately,
// but the UI level/bar animates with fill->flash->spill.
function awardXP(amount){
  if (!Number.isFinite(amount) || amount <= 0) return;

  // total XP
  score += amount;
  ui.score.textContent = score;

  // add to current-level XP, and level up logically as needed
  let tmpLevel = logicLevel;
  let tmpXP = levelXP + amount;

  while (tmpXP >= getXPRequiredFor(tmpLevel)) {
    tmpXP -= getXPRequiredFor(tmpLevel);
    tmpLevel++;
  }

  logicLevel = tmpLevel;
  levelXP = tmpXP;

  // queue UI level-ups if the display is behind
  pendingDisplayLevels = Math.max(0, logicLevel - displayLevel);

  // if we just crossed at least one level, force the UI into "fill to 100" mode
  if (pendingDisplayLevels > 0 && xpBarState === 'normal') {
    xpBarState = 'fill';
  }
}

// Call this once per frame (in update loop) to animate the bar.
function updateXPBar(dt){
  if (!Number.isFinite(dt) || dt <= 0) return;

  const reqDisplay = getXPRequiredFor(displayLevel);

  if (xpBarState === 'normal') {
    // If logical level is ahead, we need to show fill->flash cycles.
    if (pendingDisplayLevels > 0) {
      xpBarState = 'fill';
      return;
    }

    // Otherwise, just smoothly follow actual XP (same level)
    const target = Math.max(0, Math.min(reqDisplay, levelXP));
    const diff = target - displayXP;
const step = XP_FILL_SPEED * dt;

if (Math.abs(diff) <= step) {
  displayXP = target;
} else {
  displayXP += Math.sign(diff) * step;
}
    return;
  }

  if (xpBarState === 'fill') {
    // Force to 100% before leveling UI
    displayXP += XP_FILL_SPEED * dt;
    if (displayXP >= reqDisplay) {
      displayXP = reqDisplay;
      xpBarState = 'flash';
      xpFlashTimer = XP_FLASH_TIME;
    }
    return;
  }

  if (xpBarState === 'flash') {
    xpFlashTimer -= dt;
    if (xpFlashTimer <= 0) {
      // Advance displayed level AFTER flash
      displayLevel++;
// ✅ trigger perk selection
generatePerkChoices();
isPaused = true;
setMode('perk_select');
      pendingDisplayLevels = Math.max(0, pendingDisplayLevels - 1);

      // Reset display XP to begin next level bar
      displayXP = 0;

      // If still more levels queued, immediately fill again.
      // Otherwise spill leftover for the (now current) level.
      xpBarState = (pendingDisplayLevels > 0) ? 'fill' : 'spill';
    }
    return;
  }

  if (xpBarState === 'spill') {
    // Now displayLevel should match logicLevel, so animate leftover XP in.
    const req = getXPRequiredFor(displayLevel);
    const target = Math.max(0, Math.min(req, levelXP));
    const diff = target - displayXP;
const step = XP_FILL_SPEED * dt;

if (Math.abs(diff) <= step) {
  displayXP = target;
  xpBarState = 'normal';
} else {
  displayXP += Math.sign(diff) * step;
}


    if (Math.abs(target - displayXP) < 0.25) {
      displayXP = target;
      xpBarState = 'normal';
    }
    return;
  }
}

/* =========================================================
   ✅ PERK SYSTEM
========================================================= */

let availablePerks = [
  {
    id: 'firerate_common',
    name: 'Rapid Trigger',
    desc: '+10% Fire Rate',
    rarity: 'common',
    apply: () => {
      weapon.baseFireDelay *= 0.9; // ✅ faster fire rate
    }
  }
];

// current offered perks
let activePerkChoices = [];

function generatePerkChoices(count = 3){
  activePerkChoices = [];

  for (let i = 0; i < count; i++) {
    const p = availablePerks[Math.floor(Math.random() * availablePerks.length)];
    activePerkChoices.push(p);
  }
}

function renderPerkUI(){

  const slots = [ui.perk1, ui.perk2, ui.perk3];

  for (let i = 0; i < slots.length; i++) {
    const p = activePerkChoices[i];

    if (!p) continue;

    // ✅ multi-line button content
    slots[i].innerHTML = `
      <div style="text-align:center;">
        <div>${p.name}</div>
        <div style="font-size:14px; opacity:0.7;">${p.desc}</div>
        <div style="font-size:12px; color:#ffd400;">${p.rarity.toUpperCase()}</div>
      </div>
    `;
  }
}

function pickPerk(index){
  const perk = activePerkChoices[index];
  if (!perk) return;

  // ✅ apply the effect
  perk.apply();

  // ✅ resume game
  isPaused = false;
  running = true;

  setMode('game');
}

/* =========================================================
   ✅ ENEMY SYSTEM
========================================================= */
let enemies = [];


function spawnEnemies(){
  enemies = [];
  for (let i = 0; i < 6; i++) {
    enemies.push({ x: 100 + i * 70, y: 90, w: 24, h: 16, alive: true });
  }
}

function updateEnemies(){
  enemies.forEach(e => {
    if (!e.alive) return;
    e.y += 0.35;
    if (e.y > 610) e.y = 90;
  });
}

function handleBulletsVsEnemies(){
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    for (let ei = 0; ei < enemies.length; ei++) {
      const e = enemies[ei];
      if (!e.alive) continue;
      const hit =
        b.x >= (e.x - e.w/2) && b.x <= (e.x + e.w/2) &&
        b.y >= (e.y - e.h/2) && b.y <= (e.y + e.h/2);
      if (hit) {
        bullets.splice(bi, 1);
        e.alive = false;
awardXP(10);
        break;
      }
    }
  }
}

/* =========================================================
   ✅ ENEMY TYPE: ASTEROID (FALLS DOWN, 1 HP)
   Built to extend later (shooting, lane changes, more HP)
========================================================= */

let asteroids = [];
let asteroidSpawnTimer = 0;

// tuning
const ASTEROID_SPAWN_INTERVAL = 1.2; // seconds (game mode)
const ASTEROID_FALL_SPEED_MIN = 0.35; // "60fps units"
const ASTEROID_FALL_SPEED_MAX = 0.65; // "60fps units"

// create one asteroid (lane-based)
function createAsteroid(){
  return {
    type: 'asteroid',
    x: getRandomLaneX(),
    y: -20,
    w: 22,
    h: 22,
    hp: 1,
    fall: randRange(ASTEROID_FALL_SPEED_MIN, ASTEROID_FALL_SPEED_MAX)
  };
}

// spawn logic (debug forces asteroid only)
function spawnAsteroid(){
  asteroids.push(createAsteroid());
}

// update + collisions
function updateAsteroids(dt){

  // spawn rules
  if (mode === 'debug_asteroid') {
    asteroidSpawnTimer -= dt;
    if (asteroidSpawnTimer <= 0) {
      spawnAsteroid();
      asteroidSpawnTimer = 0.6; // seconds between spawns in debug
    }
  } else if (mode === 'game') {
    asteroidSpawnTimer -= dt;
    if (asteroidSpawnTimer <= 0) {
      spawnAsteroid();
      asteroidSpawnTimer = ASTEROID_SPAWN_INTERVAL;
    }
  }

  // movement (dt based; fall is tuned like your old per-frame values)
  asteroids.forEach(a => {
    a.y += a.fall * dt * 60;
  });

  // cleanup offscreen
  asteroids = asteroids.filter(a => a.y < 640);

  handleBulletsVsAsteroids();
}

function handleBulletsVsAsteroids(){
  for (let ai = asteroids.length - 1; ai >= 0; ai--) {
    const a = asteroids[ai];

    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];

      const hit =
        b.x >= (a.x - a.w/2) && b.x <= (a.x + a.w/2) &&
        b.y >= (a.y - a.h/2) && b.y <= (a.y + a.h/2);

      if (hit) {
        bullets.splice(bi, 1);
        a.hp--;

        if (a.hp <= 0) {
          asteroids.splice(ai, 1);
awardXP(5);
        }
        break;
      }
    }
  }
}

/* =========================================================
   ✅ POWER-UP SYSTEM (ALL STATS)
========================================================= */

let powerUps = [];
let powerUpSpawnTimer = 0;
let wave = 1;

let powerUpSpeedRange = { min: 0.2, max: 0.5 };

let fireRatePowerRange = { min: 5, max: 15 };
let bulletVelPowerRange = { min: 0.5, max: 1.5 };
let capacityPowerRange  = { min: 1, max: 2 };
let reloadPowerRange    = { min: 20, max: 60 };

// ✅ UTILS (MISSING BEFORE — CRITICAL)
function randRange(min, max){
  return min + Math.random() * (max - min);
}

function randInt(min, max){
  return Math.floor(min + Math.random() * (max - min + 1));
}

function computeHPFromPower(value, type){

  let baseHP = 1;

  if (type === 'stat_fireRate') baseHP = value * .35;
  if (type === 'stat_bulletVel') baseHP = value * 3.5;

  if (type === 'stat_capacity'){
    const currentMag = getMagSize();
    baseHP = 4 + (value * 2 * (currentMag / 6));
  }

  if (type === 'stat_reload'){
    const currentReload = getReloadTime();
    const scale = currentReload / 300;
    baseHP = 3 + value * 0.12 * scale;
  }

  return Math.max(1, Math.round(baseHP));
}

// ✅ CREATE FUNCTIONS (THESE WERE MISSING — CAUSED CRASH)

function createFireRatePower(){
  const v = randRange(fireRatePowerRange.min, fireRatePowerRange.max);
  return {
    type: 'stat_fireRate',
    x: getRandomLaneX(),

    y: -20,
    w: 34,
    h: 24,
    hp: computeHPFromPower(v, 'stat_fireRate'),
    power: v,
    fall: randRange(powerUpSpeedRange.min, powerUpSpeedRange.max)
  };
}

function createBulletVelPower(){
  const v = randRange(bulletVelPowerRange.min, bulletVelPowerRange.max);
  return {
    type: 'stat_bulletVel',
    x: getRandomLaneX(),

    y: -20,
    w: 34,
    h: 24,
    hp: computeHPFromPower(v, 'stat_bulletVel'),
    power: v,
    fall: randRange(powerUpSpeedRange.min, powerUpSpeedRange.max)
  };
}

function createCapacityPower(){
  const v = randInt(capacityPowerRange.min, capacityPowerRange.max);
  return {
    type: 'stat_capacity',
    x: getRandomLaneX(),

    y: -20,
    w: 34,
    h: 24,
    hp: computeHPFromPower(v, 'stat_capacity'),
    power: v,
    fall: randRange(powerUpSpeedRange.min, powerUpSpeedRange.max)
  };
}

function createReloadPower(){
  const v = randRange(reloadPowerRange.min, reloadPowerRange.max);
  return {
    type: 'stat_reload',
    x: getRandomLaneX(),

    y: -20,
    w: 34,
    h: 24,
    hp: computeHPFromPower(v, 'stat_reload'),
    power: v,
    fall: randRange(powerUpSpeedRange.min, powerUpSpeedRange.max)
  };
}

function spawnStatPowerUp(){

  // ✅ DEBUG CAP (max 4 on screen)
  if (
    mode === 'debug_power' ||
    mode === 'debug_vel' ||
    mode === 'debug_cap' ||
    mode === 'debug_reload'
  ) {
    if (powerUps.length >= 4) return;
  }

  // =========================
  // ✅ DEBUG MODE: FORCE SPAWN TYPE
  // =========================

  if (mode === 'debug_power') {
    powerUps.push(createFireRatePower());
    return;
  }

  if (mode === 'debug_vel') {
    powerUps.push(createBulletVelPower());
    return;
  }

  if (mode === 'debug_cap') {
    powerUps.push(createCapacityPower());
    return;
  }

  if (mode === 'debug_reload') {
    powerUps.push(createReloadPower());
    return;
  }

  // =========================
  // ✅ NORMAL GAME RANDOM
  // =========================

  const r = Math.random();

  if (r < 0.25) {
    powerUps.push(createFireRatePower());
  } else if (r < 0.5) {
    powerUps.push(createBulletVelPower());
  } else if (r < 0.75) {
    powerUps.push(createCapacityPower());
  } else {
    powerUps.push(createReloadPower());
  }
}

// ✅ UPDATE
function updatePowerUps(dt){
  powerUpSpawnTimer--;

  if (powerUpSpawnTimer <= 0) {
    spawnStatPowerUp();
    powerUpSpawnTimer = 120;
  }

  powerUps.forEach(p => {
  p.y += p.fall * dt * 60;
});
  powerUps = powerUps.filter(p => p.y < 640);

  handleBulletsVsPowerUps();
}

function handleBulletsVsPowerUps(){
  for (let pi = powerUps.length - 1; pi >= 0; pi--) {
    const p = powerUps[pi];

    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];

      const hit =
        b.x >= (p.x - p.w/2) && b.x <= (p.x + p.w/2) &&
        b.y >= (p.y - p.h/2) && b.y <= (p.y + p.h/2);

      if (hit) {
        bullets.splice(bi, 1);
        p.hp--;

        if (p.hp <= 0) {
          grantPowerUp(p);
          powerUps.splice(pi, 1);
        }
        break;
      }
    }
  }
}

function grantPowerUp(p){

  if (p.type === 'stat_fireRate')   applyFireRateBoost(p.power);
  if (p.type === 'stat_bulletVel')  applyBulletVelocityBoost(p.power);
  if (p.type === 'stat_capacity')   applyCapacityBoost(p.power);
  if (p.type === 'stat_reload')     applyReloadBoost(p.power);

awardXP(25); // suggested: powerups give less XP than score value, tune as desired
}

/* =========================================================
   ✅ RENDER SYSTEM (WITH ONSCREEN ERROR DISPLAY)
========================================================= */
function draw(){
  ctx.clearRect(0, 0, 600, 600);

// =========================
// ✅ LEVEL PROGRESS BAR (TOP)
// =========================
if (running || isPaused) {

  const xpRequired = getXPRequiredFor(displayLevel);
  const progress = (xpRequired > 0) ? (displayXP / xpRequired) : 0;

  const barHeight = 10;

  // background
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0, 0, 600, barHeight);

  // bar color: flash yellow on level-up
  const barColor = (xpBarState === 'flash') ? '#ffd400' : '#00d4ff';

  // progress
  ctx.fillStyle = barColor;
  ctx.fillRect(0, 0, 600 * Math.max(0, Math.min(1, progress)), barHeight);

  // level text
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText("Lv " + displayLevel, 6, barHeight + 4);
}

  // border
  ctx.strokeStyle = 'rgba(0,212,255,0.10)';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, 10, 580, 580);

  // ✅ show runtime errors at top-left so "freeze" becomes obvious
  if (typeof lastRuntimeError === "string" && lastRuntimeError.length) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,51,85,0.95)';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText("ERROR: " + lastRuntimeError, 14, 14);
    ctx.restore();
  }

  // PLAYER
  ctx.fillStyle = '#00d4ff';
  ctx.fillRect(playerX - 10, playerY, 20, 10);

// -------- AIM LINE GUIDE --------
if (running) {

  ctx.save();

  const aimStartY = playerY - 5;
  const aimEndY = 40;

  const aimX = playerX;

  // ✅ fade line (strong near player → fades upward)
  const grad = ctx.createLinearGradient(aimX, aimStartY, aimX, aimEndY);
  grad.addColorStop(0, "rgba(255,255,255,0.45)");
  grad.addColorStop(1, "rgba(255,255,255,0)");

  ctx.strokeStyle = grad;
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(aimX, aimStartY);
  ctx.lineTo(aimX, aimEndY);
  ctx.stroke();

  ctx.restore();
}

  // -------- AMMO UI --------
  const ammoW = 3;
  const ammoH = 5;
  const ammoGap = 2;
  const ammoMaxPerRow = 16;

  const currentAmmo = ammoInMag;
  const maxAmmo = getMagSize();
  const ammoTopY = 560;

  for (let i = 0; i < maxAmmo; i++) {
    const row = Math.floor(i / ammoMaxPerRow);
    const col = i % ammoMaxPerRow;

    const rowCount = Math.min(maxAmmo - row * ammoMaxPerRow, ammoMaxPerRow);
    const totalW = rowCount * (ammoW + ammoGap) - ammoGap;
    const startX = playerX - totalW / 2;

    ctx.fillStyle = (i < currentAmmo) ? '#ffffff' : 'rgba(255,255,255,0.25)';
    ctx.fillRect(
      startX + col * (ammoW + ammoGap),
      ammoTopY + row * (ammoH + ammoGap),
      ammoW,
      ammoH
    );
  }

  // -------- RELOAD BAR (seconds-accurate) --------
  const firstRowCount = Math.min(maxAmmo, ammoMaxPerRow);
  const ammoRowWidth = firstRowCount * (ammoW + ammoGap) - ammoGap;
  const ammoStartX = playerX - ammoRowWidth / 2;

  const barHeight = 2;
  const barX = ammoStartX;
  const barY = ammoTopY - 6;
  const barWidth = ammoRowWidth;

  let reloadProgress = 1;
  if (isReloading) {
    const totalReload = getReloadTime() / 60; // frames → seconds for display
    reloadProgress = 1 - (reloadTimer / totalReload);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(barX, barY, barWidth, barHeight);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(barX, barY, barWidth * reloadProgress, barHeight);

  // BULLETS
  ctx.fillStyle = '#ffffff';
  bullets.forEach(b => ctx.fillRect(b.x - 2, b.y, 4, 10));

// ASTEROIDS
ctx.fillStyle = 'rgba(200,200,200,0.95)';
asteroids.forEach(a => {
  ctx.fillRect(a.x - a.w/2, a.y - a.h/2, a.w, a.h);
});

  // ENEMIES
  ctx.fillStyle = '#ff3355';
  enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
  });

  // -------- AIM DETECTION --------
  const aimWindowPx = 14;
  let aimedIndex = -1;
  let bestDx = Infinity;

  for (let i = 0; i < powerUps.length; i++) {
    const p = powerUps[i];
    if (p.y > playerY) continue;

    const dx = Math.abs(p.x - playerX);
    if (dx <= aimWindowPx && dx < bestDx) {
      bestDx = dx;
      aimedIndex = i;
    }
  }

  // -------- POWERUPS (WITH LABELS + HP) --------
  powerUps.forEach((p, idx) => {
    const isAimed = (idx === aimedIndex);

    ctx.save();

    ctx.fillStyle = '#ffd400';
    ctx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);

    if (isAimed) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 10;
      ctx.strokeRect(p.x - p.w/2 - 2, p.y - p.h/2 - 2, p.w + 4, p.h + 4);
    }

    // labels
    let labelTop = "";
    let labelBottom = "";

    if (p.type === 'stat_fireRate') { labelTop = "FR"; labelBottom = "+" + Math.round(p.power); }
    else if (p.type === 'stat_bulletVel') { labelTop = "BV"; labelBottom = "+" + Number(p.power).toFixed(1); }
    else if (p.type === 'stat_capacity') { labelTop = "CP"; labelBottom = "+" + Math.round(p.power); }
    else if (p.type === 'stat_reload') { labelTop = "RL"; labelBottom = "-" + Math.round(p.power); }

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labelTop, p.x, p.y - 6);
    ctx.fillText(labelBottom, p.x, p.y + 6);

    // hp pips centered
    ctx.fillStyle = '#fff';
    const pip = 3, gap = 2, maxPerRow = 7;

    for (let i = 0; i < p.hp; i++) {
      const row = Math.floor(i / maxPerRow);
      const col = i % maxPerRow;

      const rowCount = Math.min(p.hp - row * maxPerRow, maxPerRow);
      const totalW = rowCount * (pip + gap) - gap;
      const startX = p.x - totalW / 2;

      ctx.fillRect(
        startX + col * (pip + gap),
        p.y + p.h/2 + 4 + row * (pip + gap + 1),
        pip, pip
      );
    }

    ctx.restore();
  });

  // -------- HUD STATS --------
  const delay = getFireDelay();
  const rps = 60 / delay;
  ui.fd.textContent = Math.round(rps * 100);
  ui.bs.textContent = getBulletSpeed().toFixed(1);
  ui.bc.textContent = getMagSize();
  ui.rt.textContent = (getReloadTime() / 60).toFixed(1);
}
/* =========================================================
   ✅ MODE / NAV + RUN START (REQUIRED FOR DEBUG MENU)
========================================================= */

function resetRunState(){

// ✅ LEVEL / XP RESET
score = 0;
logicLevel = 1;
levelXP = 0;

displayLevel = 1;
displayXP = 0;

xpBarState = 'normal';
xpFlashTimer = 0;
pendingDisplayLevels = 0;

ui.score.textContent = score;

  bullets = [];
  fireTimer = 0;

asteroids = [];
asteroidSpawnTimer = 0;

  enemies = [];
  powerUps = [];
  powerUpSpawnTimer = 60;

  initWeaponState();
}

function setMode(nextMode){
  mode = nextMode;
  ui.status.textContent = nextMode;

// ✅ HUD visibility
if (nextMode === 'paused') {
  ui.hud.classList.remove('hidden');
  ui.hud.style.top = '40px'; // ✅ SHIFT DOWN
} else {
  ui.hud.classList.add('hidden');
  ui.hud.style.top = '0px'; // ✅ RESET
}

  ui.menuRow.classList.add('hidden');
  ui.debugRow.classList.add('hidden');
  ui.pauseRow.classList.add('hidden');
ui.perkRow.classList.add('hidden'); // ✅ ADD THIS
document.getElementById('title').classList.remove('hideInPerk');
document.getElementById('subtitle').classList.remove('hideInPerk');

ui.perkRow.classList.add('hidden');
if (nextMode === 'perk_select') {

  document.getElementById('title').classList.add('hideInPerk');
  document.getElementById('subtitle').classList.add('hideInPerk');

  ui.panel.classList.remove('hidden');
  ui.perkRow.classList.remove('hidden');

  renderPerkUI();

  ui.perk2.focus();
  setTimeout(ensureFocus, 0);
  return;
}

  if (nextMode === 'menu') {
    ui.panel.classList.remove('hidden');
    ui.menuRow.classList.remove('hidden');

    ui.btnStart.focus();
    setTimeout(ensureFocus, 0);
    return;
  }

  if (nextMode === 'debugMenu') {
    ui.panel.classList.remove('hidden');
    ui.debugRow.classList.remove('hidden');

    ui.btnDbgMove.focus();
    setTimeout(ensureFocus, 0);
    return;
  }
if (nextMode === 'paused') {
  ui.panel.classList.remove('hidden');
  ui.pauseRow.classList.remove('hidden');

  ui.btnResume.focus();
  setTimeout(ensureFocus, 0);
  return;
}

  ui.panel.classList.add('hidden');
}

function goToMenu(){
  running = false;
  resetRunState();
  setMode('menu');
}

function exitToMenu(){
  goToMenu();
}

function startRun(runMode){
  running = true;

  resetRunState();

if (runMode === 'debug_asteroid') {
  asteroidSpawnTimer = 0.1; // spawn almost immediately
}
if (runMode === 'game') {
  asteroidSpawnTimer = 1.0; // game spawn delay
}

  centerGamma = rawGamma;

  if (runMode === 'game') spawnEnemies();
  if (runMode === 'debug_enemy') spawnEnemies();

  if (
    runMode === 'debug_power' ||
    runMode === 'debug_vel' ||
    runMode === 'debug_cap' ||
    runMode === 'debug_reload'
  ) {
    powerUpSpawnTimer = 10;
  }

  setMode(runMode);
}

/* =========================================================
   ✅ CORE GAME LOOP (REAL TIME / DELTA TIME + ONSCREEN ERRORS)
========================================================= */
let lastTime = performance.now();
let lastRuntimeError = "";

function update(now){
  try {
    // ✅ REAL dt in seconds
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    // clear any previous error once we successfully tick
    lastRuntimeError = "";

    // movement always ticks
    updateMovement(dt);

updateXPBar(dt);

if (running && !isPaused) {
  updateWeapons(dt);

  if (mode === 'game' || mode === 'debug_enemy') {
    updateEnemies();
    handleBulletsVsEnemies();
  }

  if (mode === 'game' || mode === 'debug_asteroid') {
    updateAsteroids(dt);
  }

  if (
    mode === 'game' ||
    mode === 'debug_power' ||
    mode === 'debug_vel' ||
    mode === 'debug_cap' ||
    mode === 'debug_reload'
  ) {
    updatePowerUps(dt);
  }
}

    draw();

  } catch (err) {
    // ✅ capture error so you SEE it on-screen
    lastRuntimeError = (err && err.message) ? err.message : String(err);
    console.error("Game error:", err);

    // still draw so the HUD/menu can show
    try { draw(); } catch(e) {}
  }

  requestAnimationFrame(update);
}

// ✅ start loop ONCE (delete any other requestAnimationFrame(update) lines elsewhere)
requestAnimationFrame(update);

/* =========================================================
   ✅ UI WIRING
========================================================= */

ui.btnResume.addEventListener('click', () => {
  isPaused = false;
  setMode('game');
});

ui.btnExit.addEventListener('click', () => {
  isPaused = false;
  exitToMenu();
});

ui.btnStart.addEventListener('click', () => startRun('game'));
ui.perk1.addEventListener('click', () => pickPerk(0));
ui.perk2.addEventListener('click', () => pickPerk(1));
ui.perk3.addEventListener('click', () => pickPerk(2));

// ✅ Debug menu open
ui.btnDebug.addEventListener('click', () => setMode('debugMenu'));

ui.btnDbgMove.addEventListener('click', () => startRun('debug_move'));
ui.btnDbgWeapon.addEventListener('click', () => startRun('debug_weapon'));
ui.btnDbgEnemy.addEventListener('click', () => startRun('debug_enemy'));
ui.btnDbgAsteroid.addEventListener('click', () => startRun('debug_asteroid'));

ui.btnDbgPower.addEventListener('click', () => startRun('debug_power'));
ui.btnDbgVel.addEventListener('click', () => startRun('debug_vel'));
ui.btnDbgCap.addEventListener('click', () => startRun('debug_cap'));
ui.btnDbgReload.addEventListener('click', () => startRun('debug_reload'));


ui.btnDbgBack.addEventListener('click', () => setMode('menu'));

</script>
